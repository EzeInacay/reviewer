<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suggestions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b0e14; --panel:#111826; --panel-edge:#202a3d; --copper:#c17a4d; --copper-bright:#e2965f;
    --phosphor:#6df7c1; --gold:#f2c14e; --red:#e2352f; --text:#e8ecf1; --text-dim:#8b94a7;
    --mono:'Space Mono', monospace; --sans:'Inter', sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0; background:var(--bg); color:var(--text); font-family:var(--sans);
    display:flex; flex-direction:column; height:100vh; overflow:hidden;
  }
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 18px; border-bottom:1px solid var(--panel-edge); flex-shrink:0; gap:10px; flex-wrap:wrap;
  }
  a.back{
    font-family:var(--mono); font-size:11px; color:var(--text-dim); text-decoration:none;
    border:1px solid var(--panel-edge); border-radius:6px; padding:6px 10px;
  }
  a.back:hover{border-color:var(--copper); color:var(--copper-bright);}
  .title{font-family:var(--mono); font-weight:700; color:var(--copper-bright); font-size:15px; letter-spacing:.04em;}
  .title span{color:var(--text-dim); font-weight:400; font-size:11px; margin-left:8px;}
  .connectbtn{
    font-family:var(--mono); font-size:10.5px; color:var(--text-dim); background:none;
    border:1px solid var(--panel-edge); border-radius:6px; padding:6px 9px; cursor:pointer;
  }
  .connectbtn:hover{border-color:var(--phosphor); color:var(--phosphor);}
  .connectbtn.connected{border-color:var(--phosphor); color:var(--phosphor);}

  .messages{
    flex:1; overflow-y:auto; padding:18px; max-width:720px; width:100%; margin:0 auto;
  }
  .empty-state{color:var(--text-dim); font-size:13px; text-align:center; padding:60px 20px; font-family:var(--mono);}

  .msg{
    background:var(--panel); border:1px solid var(--panel-edge); border-radius:10px;
    padding:12px 14px; margin-bottom:10px; display:flex; gap:10px; align-items:flex-start;
  }
  .msg-body{flex:1; min-width:0;}
  .msg-head{display:flex; gap:8px; align-items:baseline; margin-bottom:4px; flex-wrap:wrap;}
  .msg-name{font-family:var(--mono); font-size:12.5px; font-weight:700; color:var(--phosphor);}
  .msg-time{font-family:var(--mono); font-size:10.5px; color:var(--text-dim);}
  .msg-text{font-size:14px; line-height:1.5; word-wrap:break-word; white-space:pre-wrap;}
  .msg-delete{
    flex-shrink:0; font-family:var(--mono); font-size:11px; background:none; color:var(--text-dim);
    border:1px solid var(--panel-edge); border-radius:6px; padding:6px 9px; cursor:pointer;
  }
  .msg-delete:hover{border-color:var(--red); color:var(--red);}

  .inputbar{
    flex-shrink:0; border-top:1px solid var(--panel-edge); background:var(--panel);
    padding:12px 18px; max-width:720px; width:100%; margin:0 auto; box-sizing:border-box;
  }
  .inputbar-row{display:flex; gap:8px;}
  input.name-input{
    width:140px; flex-shrink:0; font-family:var(--sans); font-size:13px; background:#0e1420;
    border:1px solid var(--panel-edge); color:var(--text); border-radius:8px; padding:10px 12px;
  }
  input.msg-input{
    flex:1; font-family:var(--sans); font-size:13px; background:#0e1420;
    border:1px solid var(--panel-edge); color:var(--text); border-radius:8px; padding:10px 12px;
  }
  input.name-input:focus, input.msg-input:focus{outline:none; border-color:var(--copper);}
  button.send-btn{
    font-family:var(--sans); font-weight:600; font-size:13px; background:var(--copper); color:#1b120b;
    border:none; border-radius:8px; padding:10px 18px; cursor:pointer; flex-shrink:0;
  }
  button.send-btn:hover{background:var(--copper-bright);}
  .hint{font-family:var(--mono); font-size:10px; color:var(--text-dim); margin-top:6px;}

  .modal-overlay{
    position:fixed; inset:0; background:rgba(3,4,6,0.85); display:none;
    align-items:center; justify-content:center; z-index:50; padding:20px;
  }
  .modal-overlay.active{display:flex;}
  .modal{
    background:var(--panel); border:1px solid var(--panel-edge); border-radius:12px;
    padding:20px; max-width:300px; width:100%;
  }
  .modal-title{font-family:var(--mono); font-size:13px; color:var(--text); margin-bottom:12px;}
  .modal input{
    width:100%; font-family:var(--mono); font-size:14px; text-align:center; background:#0e1420;
    border:1px solid var(--panel-edge); color:var(--text); border-radius:8px; padding:10px; margin-bottom:10px;
  }
  .modal input:focus{outline:none; border-color:var(--red);}
  .modal-row{display:flex; gap:8px;}
  .modal-btn{
    flex:1; font-family:var(--sans); font-weight:600; font-size:12.5px; border:none; border-radius:8px;
    padding:9px; cursor:pointer;
  }
  .modal-btn.confirm{background:var(--red); color:#fff;}
  .modal-btn.cancel{background:transparent; border:1px solid var(--panel-edge); color:var(--text-dim);}
  .modal-error{color:var(--red); font-family:var(--mono); font-size:11px; margin-top:8px; min-height:14px; text-align:center;}
</style>
</head>
<body>

<div class="topbar">
  <a class="back" href="index.html">&larr; HOME</a>
  <div class="title">SUGGESTIONS <span id="msgCount">(0)</span></div>
  <button class="connectbtn" id="connectBtn" onclick="connectFile()">CONNECT FILE</button>
</div>

<div class="messages" id="messages"></div>

<div class="inputbar">
  <div class="inputbar-row">
    <input class="name-input" id="nameInput" placeholder="Name" autocomplete="off">
    <input class="msg-input" id="msgInput" placeholder="Type a suggestion..." autocomplete="off">
    <button class="send-btn" onclick="sendMessage()">SEND</button>
  </div>
  <div class="hint" id="hintText">Press Enter to send. Click CONNECT FILE and pick this same suggestion.html so messages actually save to disk — otherwise they only last this session.</div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title">Enter password to delete this message</div>
    <input type="password" id="deletePassword" placeholder="password" autocomplete="off">
    <div class="modal-row">
      <button class="modal-btn cancel" onclick="closeModal()">CANCEL</button>
      <button class="modal-btn confirm" onclick="confirmDelete()">DELETE</button>
    </div>
    <div class="modal-error" id="modalError"></div>
  </div>
</div>

<script id="mainScript">
function utf8ToB64(str){ return btoa(unescape(encodeURIComponent(str))); }
function b64ToUtf8(b64){ return decodeURIComponent(escape(atob(b64))); }

/*SEED_START*/
let SEED_B64 = "e30=";
/*SEED_END*/
let seed = JSON.parse(b64ToUtf8(SEED_B64));
let messages = seed.messages || [];
let nextId = seed.nextId || 1;

let fileHandle = null;
const supportsDirectSave = !!window.showOpenFilePicker;
const MAX_MESSAGES = 100;

if(!supportsDirectSave){
  document.getElementById('connectBtn').style.display = 'none';
  document.getElementById('hintText').textContent = 'Direct file saving needs Chrome or Edge. Messages will only last this session in this browser.';
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function renderMessages(){
  const container = document.getElementById('messages');
  document.getElementById('msgCount').textContent = '(' + messages.length + ')';
  container.innerHTML = '';

  if(messages.length === 0){
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.textContent = 'No suggestions yet — be the first to send one below.';
    container.appendChild(empty);
    return;
  }

  messages.forEach(function(m){
    const row = document.createElement('div');
    row.className = 'msg';
    const body = document.createElement('div');
    body.className = 'msg-body';
    const head = document.createElement('div');
    head.className = 'msg-head';
    const nameEl = document.createElement('span');
    nameEl.className = 'msg-name';
    nameEl.textContent = m.name;
    const timeEl = document.createElement('span');
    timeEl.className = 'msg-time';
    timeEl.textContent = m.time;
    head.appendChild(nameEl);
    head.appendChild(timeEl);
    const textEl = document.createElement('div');
    textEl.className = 'msg-text';
    textEl.textContent = m.text;
    body.appendChild(head);
    body.appendChild(textEl);
    const delBtn = document.createElement('button');
    delBtn.className = 'msg-delete';
    delBtn.textContent = 'DELETE';
    delBtn.onclick = function(){ openModal(m.id); };
    row.appendChild(body);
    row.appendChild(delBtn);
    container.appendChild(row);
  });
  container.scrollTop = container.scrollHeight;
}

async function sendMessage(){
  const nameEl = document.getElementById('nameInput');
  const msgEl = document.getElementById('msgInput');
  const text = msgEl.value.trim();
  if(!text) return;

  if(!fileHandle && supportsDirectSave){
    await connectFile(true);
  }

  messages.push({
    id: nextId++,
    name: nameEl.value.trim() || 'Anonymous',
    text: text,
    time: new Date().toLocaleString()
  });

  if(messages.length > MAX_MESSAGES){
    messages = [];
    nextId = 1;
  }

  msgEl.value = '';
  msgEl.focus();
  renderMessages();
  await saveState();
}

document.getElementById('msgInput').addEventListener('keydown', function(e){
  if(e.key === 'Enter'){ sendMessage(); }
});

function openModal(id){
  window.pendingDeleteId = id;
  document.getElementById('deletePassword').value = '';
  document.getElementById('modalError').textContent = '';
  document.getElementById('modalOverlay').classList.add('active');
  document.getElementById('deletePassword').focus();
}
function closeModal(){
  window.pendingDeleteId = null;
  document.getElementById('modalOverlay').classList.remove('active');
}
async function confirmDelete(){
  const pw = document.getElementById('deletePassword').value;
  if(pw !== 'password'){
    document.getElementById('modalError').textContent = 'Wrong password.';
    return;
  }
  messages = messages.filter(function(m){ return m.id !== window.pendingDeleteId; });
  closeModal();
  renderMessages();
  await saveState();
}
document.getElementById('deletePassword').addEventListener('keydown', function(e){
  if(e.key === 'Enter'){ confirmDelete(); }
});
document.getElementById('modalOverlay').addEventListener('click', function(e){
  if(e.target === this){ closeModal(); }
});

/* ---- direct file connect / read / write ---- */
async function connectFile(silent){
  if(!supportsDirectSave) return;
  try{
    const [handle] = await window.showOpenFilePicker({
      types: [{ description: 'HTML file', accept: {'text/html': ['.html']} }]
    });
    const file = await handle.getFile();
    const text = await file.text();
    PAGE_SOURCE = text;
    const parsed = parseSeed(text);
    fileHandle = handle;
    if(parsed){
      messages = parsed.messages;
      nextId = parsed.nextId;
      renderMessages();
    }
    const btn = document.getElementById('connectBtn');
    btn.textContent = 'CONNECTED ✓';
    btn.classList.add('connected');
    document.getElementById('hintText').textContent = 'Connected to ' + handle.name + ' — messages now save directly to it.';
  } catch(err){
    if(err.name !== 'AbortError' && !silent){
      document.getElementById('hintText').textContent = 'Could not connect: ' + err.message;
    }
  }
}

function parseSeed(text){
  const match = text.match(/let SEED_B64 = "([^"]*)";/);
  if(!match) return null;
  try{
    const data = JSON.parse(b64ToUtf8(match[1]));
    return { messages: data.messages || [], nextId: data.nextId || 1 };
  } catch(err){
    return null;
  }
}

function buildFileContents(){
  const encoded = utf8ToB64(JSON.stringify({messages: messages, nextId: nextId}));
  return PAGE_SOURCE
    .replace(/let SEED_B64 = "[^"]*";/, 'let SEED_B64 = "' + encoded + '";');
}

async function saveState(){
  if(fileHandle){
    try{
      const contents = buildFileContents();
      const writable = await fileHandle.createWritable();
      await writable.write(contents);
      await writable.close();
      return;
    } catch(err){
      document.getElementById('hintText').textContent = 'Direct save failed (' + err.message + ').';
      return;
    }
  }
}

let PAGE_SOURCE = '';

renderMessages();
</script>
</body>
</html>
