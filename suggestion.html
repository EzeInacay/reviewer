<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Suggestions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#0b0e14; --panel:#111826; --panel-edge:#202a3d; --copper:#c17a4d; --phosphor:#6df7c1; --text:#e8ecf1; --text-dim:#8b94a7; }
  *{box-sizing:border-box;}
  body{ margin:0; background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; padding:24px 16px 60px; }
  .wrap{max-width:640px;margin:0 auto;}
  h1{ font-family:'Space Mono',monospace; color:var(--copper); font-size:24px; }
  a.back{ font-family:'Space Mono',monospace; font-size:11px; color:var(--text-dim); text-decoration:none; border:1px solid var(--panel-edge); border-radius:6px; padding:6px 10px; display:inline-block; margin-bottom:16px; }
  .entry{ background:var(--panel); border:1px solid var(--panel-edge); border-radius:10px; padding:14px 16px; margin-bottom:10px; }
  .entry-head{ display:flex; justify-content:space-between; font-family:'Space Mono',monospace; font-size:11px; color:var(--phosphor); margin-bottom:6px; }
  .entry-time{color:var(--text-dim);}
  .entry-msg{font-size:13.5px; line-height:1.5;}
  .empty{color:var(--text-dim); font-size:13px; text-align:center; padding:30px 0;}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="index.html">&larr; HOME</a>
  <h1>Suggestions (0)</h1>
  <div class="empty">No suggestions yet.</div>
</div>
<script type="application/json" id="sugData">[]</script>
</body>
</html>
