<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Array & Stack Lab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b0e14; --panel:#151a22; --panel-edge:#2a323f; --steel:#8a929f;
    --red:#e2352f; --phosphor:#6df7c1; --gold:#f2c14e;
    --text:#eef1f5; --text-dim:#9aa2b1; --mono:'Space Mono', monospace; --sans:'Inter', sans-serif;
  }
  *{box-sizing:border-box;}
  body{ margin:0; background:#050608; color:var(--text); font-family:var(--sans); min-height:100vh; padding:14px; }
  .frame{ max-width:820px;margin:0 auto; border:1px solid var(--panel-edge); border-radius:12px; background:#0a0c10; padding:20px; }
  .topbar{display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:10px;}
  .logo{font-family:var(--mono); font-weight:700; line-height:1.1;}
  .logo .l1{font-size:20px; letter-spacing:.08em; color:var(--phosphor);}
  .logo .l2{font-size:11px; letter-spacing:.14em; color:var(--text-dim);}
  a.homelink{font-family:var(--mono); font-size:11px; color:var(--text-dim); text-decoration:none; border:1px solid var(--panel-edge); border-radius:6px; padding:6px 10px;}
  a.homelink:hover{border-color:var(--phosphor); color:var(--phosphor);}

  .levelbar{display:flex; gap:6px; justify-content:center; margin-bottom:18px; flex-wrap:wrap;}
  .levelpip{ font-family:var(--mono); font-size:10px; width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; background:var(--panel); border:1px solid var(--panel-edge); color:var(--text-dim); }
  .levelpip.done{background:#123b2c; border-color:var(--phosphor); color:var(--phosphor);}
  .levelpip.current{border-color:var(--gold); color:var(--gold);}

  .panel{background:var(--panel); border:1px solid var(--panel-edge); border-radius:12px; padding:20px;}
  .ltitle{font-family:var(--mono); font-size:12px; letter-spacing:.1em; color:var(--phosphor); text-transform:uppercase; margin-bottom:4px;}
  .lsub{color:var(--text-dim); font-size:13.5px; line-height:1.5; margin-bottom:16px;}
  .prompt{ font-family:var(--mono); font-size:15px; color:var(--gold); background:#0e1420; border:1px solid var(--panel-edge); border-radius:8px; padding:12px 14px; margin-bottom:16px; text-align:center; }

  .array-row{display:flex; gap:6px; justify-content:center; margin-bottom:6px; flex-wrap:wrap;}
  .cell{
    width:52px; height:52px; border-radius:8px; background:#0e1420; border:2px solid var(--panel-edge);
    display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-size:16px; font-weight:700;
    color:var(--text); cursor:default; position:relative; transition:transform .15s, border-color .15s;
  }
  .cell.empty{color:var(--text-dim); border-style:dashed;}
  .cell.clickable{cursor:pointer;}
  .cell.clickable:hover{border-color:var(--steel); transform:translateY(-2px);}
  .cell.top{border-color:var(--gold); box-shadow:0 0 10px rgba(242,193,78,.4);}
  .cell.solved{border-color:var(--phosphor); color:var(--phosphor);}
  .cell.wrongflash{border-color:var(--red);}
  .cell.dimmed{opacity:.35;}
  .idx-row{display:flex; gap:6px; justify-content:center; margin-bottom:14px; flex-wrap:wrap;}
  .idx{width:52px; text-align:center; font-family:var(--mono); font-size:10px; color:var(--text-dim);}
  .idx.top-label{color:var(--gold); font-weight:700;}

  .controls{display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin-top:14px;}
  input.valinput{ width:90px; font-family:var(--mono); font-size:15px; text-align:center; background:#0e1420; border:1px solid var(--panel-edge); color:var(--text); border-radius:6px; padding:8px;}
  input.valinput:focus{outline:none; border-color:var(--phosphor);}
  button.op{ font-family:var(--sans); font-weight:600; font-size:13px; background:var(--steel); color:#111; border:none; border-radius:6px; padding:9px 16px; cursor:pointer; }
  button.op:hover{background:#a9b2bf;}
  button.op.primary{background:var(--phosphor);}
  button.op.danger{background:var(--red); color:#fff;}
  button.op:disabled{opacity:.35; cursor:not-allowed;}

  .choice-row{display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-top:14px;}
  .choice{ font-family:var(--sans); font-size:13px; background:#0e1420; border:1px solid var(--panel-edge); color:var(--text); border-radius:8px; padding:10px 16px; cursor:pointer; }
  .choice:hover{border-color:var(--steel);}
  .choice.correct{border-color:var(--phosphor); color:var(--phosphor);}
  .choice.wrong{border-color:var(--red); color:var(--red);}

  .feedback{ text-align:center; font-family:var(--mono); font-size:12.5px; margin-top:14px; min-height:18px; }
  .feedback.ok{color:var(--phosphor);}
  .feedback.bad{color:var(--red);}
  .feedback.hint{color:var(--text-dim);}

  .statline{display:flex; justify-content:center; gap:18px; font-family:var(--mono); font-size:11px; color:var(--text-dim); margin-bottom:14px;}
  .statline b{color:var(--gold);}

  .bracket-str{ font-family:var(--mono); font-size:22px; text-align:center; letter-spacing:.15em; margin-bottom:16px; }
  .bracket-str span{padding:2px 3px; border-radius:4px;}
  .bracket-str span.cur{background:var(--gold); color:#111;}
  .bracket-str span.done{color:var(--phosphor);}
  .bracket-str span.bad{background:var(--red); color:#fff;}

  .nextbtn{display:none; margin:18px auto 0; font-family:var(--mono); font-weight:700; font-size:13px; background:var(--gold); color:#111; border:none; border-radius:8px; padding:10px 22px; cursor:pointer;}

  .final{text-align:center;}
  .final .big{font-family:var(--mono); font-size:28px; color:var(--phosphor); margin-bottom:10px;}
  .lesson{ text-align:left; background:#0e1420; border:1px solid var(--panel-edge); border-radius:8px; padding:14px 16px; margin:16px 0; font-size:13px; line-height:1.6; color:var(--text-dim);}
  .lesson b{color:var(--gold);}
</style>
</head>
<body>
<div class="frame">
  <div class="topbar">
    <a class="homelink" href="index.html">&larr; HOME</a>
    <div class="logo" style="text-align:right;">
      <div class="l1">ARRAY &amp; STACK LAB</div>
      <div class="l2">DATA STRUCTURES &amp; ALGORITHMS</div>
    </div>
  </div>

  <div class="levelbar" id="levelbar"></div>

  <div class="panel" id="panel"></div>
</div>

<script>
/* ================= SHARED STATE: one array IS the stack, used across every level ================= */
const ARRAY_SIZE = 8;
let arr = new Array(ARRAY_SIZE).fill(null); // each null or number
let stackTop = -1; // index of top element, -1 = empty
let level = 1;
const TOTAL_LEVELS = 6;
let mistakes = 0;

function shuffle(a){ return [...a].sort(()=>Math.random()-0.5); }
function pickQuestion(pool, usedIndices){
  const available = pool.filter((_, i) => !usedIndices.includes(i));
  if (available.length === 0) { usedIndices.length = 0; }
  const src = available.length ? available : pool;
  const idx = pool.indexOf(src[Math.floor(Math.random()*src.length)]);
  return { idx, q: pool[idx] };
}

function renderLevelBar(){
  const bar = document.getElementById('levelbar');
  bar.innerHTML='';
  for(let i=1;i<=TOTAL_LEVELS;i++){
    const pip = document.createElement('div');
    pip.className = 'levelpip'+(i<level?' done':'')+(i===level?' current':'');
    pip.textContent = i;
    bar.appendChild(pip);
  }
}

/* Renders the shared array as a row of boxes. topIdx=-1 hides the TOP marker. */
function renderArrayBoxes(containerId, size, opts){
  opts = opts || {};
  const idxRow = document.createElement('div');
  idxRow.className='idx-row';
  const row = document.createElement('div');
  row.className='array-row';
  for(let i=0;i<size;i++){
    const idxLbl = document.createElement('div');
    idxLbl.className='idx'+(i===opts.topIdx?' top-label':'');
    idxLbl.textContent = i===opts.topIdx ? 'TOP' : i;
    idxRow.appendChild(idxLbl);

    const cell = document.createElement('div');
    const val = arr[i];
    cell.className = 'cell'+(val===null?' empty':'')+(i===opts.topIdx?' top':'');
    cell.id = containerId+'-cell-'+i;
    cell.textContent = val===null ? '' : val;
    if(opts.onClick){
      cell.classList.add('clickable');
      cell.onclick = ()=>opts.onClick(i);
    }
    row.appendChild(cell);
  }
  const target = document.getElementById(containerId);
  target.innerHTML='';
  target.appendChild(idxRow);
  target.appendChild(row);
}

function goNextLevel(){
  level++;
  if(level>TOTAL_LEVELS){ renderFinal(); return; }
  renderLevelBar();
  renderLevel();
}
function showNext(panelId){
  const btn = document.getElementById('nextbtn');
  btn.style.display='block';
}

function renderLevel(){
  document.getElementById('panel').innerHTML = '';
  renderLevelBar();
  if(level===1) renderLevel1();
  if(level===2) renderLevel2();
  if(level===3) renderLevel3();
  if(level===4) renderLevel4();
  if(level===5) renderLevel5();
  if(level===6) renderLevel6();
}

/* ================= LEVEL 1: PUSH ================= */
const l1Instructions = [5,12,8,20,3];
let l1Ptr = 0;
function renderLevel1(){
  arr = new Array(ARRAY_SIZE).fill(null);
  stackTop = -1;
  l1Ptr = 0;
  const p = document.getElementById('panel');
  p.innerHTML = `
    <div class="ltitle">Level 1 · Push</div>
    <div class="lsub">A stack can be built on top of a plain array, using a <b>top</b> pointer. Pushing always writes to <code>top + 1</code> — the next open slot — which is why push is O(1). Follow the instructions below, in order.</div>
    <div class="prompt" id="l1-prompt"></div>
    <div id="l1-array"></div>
    <div class="controls">
      <input class="valinput" id="l1-input" placeholder="value" autocomplete="off">
      <button class="op primary" onclick="doPush1()">PUSH</button>
    </div>
    <div class="feedback" id="l1-fb"></div>
    <button class="nextbtn" id="nextbtn" onclick="goNextLevel()">NEXT LEVEL &rarr;</button>`;
  updateL1Prompt();
  renderArrayBoxes('l1-array', ARRAY_SIZE, {topIdx: stackTop});
}
function updateL1Prompt(){
  if(l1Ptr>=l1Instructions.length){
    document.getElementById('l1-prompt').textContent = 'All done! The stack now holds '+l1Instructions.length+' items, and every push only touched the top slot — O(1) each time.';
    document.getElementById('l1-fb').className='feedback ok';
    document.getElementById('l1-fb').textContent='Level complete.';
    showNext();
    return;
  }
  document.getElementById('l1-prompt').textContent = 'Push '+l1Instructions[l1Ptr];
}
function doPush1(){
  if(l1Ptr>=l1Instructions.length) return;
  const input = document.getElementById('l1-input');
  const val = parseInt(input.value,10);
  const fb = document.getElementById('l1-fb');
  if(isNaN(val)){ fb.className='feedback bad'; fb.textContent='Enter a number first.'; return; }
  if(val !== l1Instructions[l1Ptr]){
    mistakes++;
    fb.className='feedback bad';
    fb.textContent='Not quite — the instruction asked for '+l1Instructions[l1Ptr]+'.';
    return;
  }
  stackTop++;
  arr[stackTop] = val;
  renderArrayBoxes('l1-array', ARRAY_SIZE, {topIdx: stackTop});
  input.value='';
  fb.className='feedback ok';
  fb.textContent='Pushed '+val+'. Top is now index '+stackTop+'.';
  l1Ptr++;
  updateL1Prompt();
}

/* ================= LEVEL 2: POP & PREDICT ================= */
let l2Rounds = 3;
function renderLevel2(){
  const p = document.getElementById('panel');
  p.innerHTML = `
    <div class="ltitle">Level 2 · Pop &amp; Predict</div>
    <div class="lsub">A stack is LIFO — Last In, First Out. Before you pop, predict what comes off the top.</div>
    <div id="l2-array"></div>
    <div class="prompt">If you POP right now, what value comes off?</div>
    <div class="controls">
      <input class="valinput" id="l2-input" placeholder="value" autocomplete="off">
      <button class="op primary" onclick="doPredictPop()">SUBMIT PREDICTION</button>
    </div>
    <div class="feedback" id="l2-fb"></div>
    <button class="nextbtn" id="nextbtn" onclick="goNextLevel()">NEXT LEVEL &rarr;</button>`;
  renderArrayBoxes('l2-array', ARRAY_SIZE, {topIdx: stackTop});
}
function doPredictPop(){
  const input = document.getElementById('l2-input');
  const val = parseInt(input.value,10);
  const fb = document.getElementById('l2-fb');
  if(stackTop<0){ fb.className='feedback bad'; fb.textContent='The stack is already empty — popping now would cause underflow.'; return; }
  const actual = arr[stackTop];
  if(val !== actual){
    mistakes++;
    fb.className='feedback bad';
    fb.textContent='Nope — the top of the stack was '+actual+'. Popping it now...';
  } else {
    fb.className='feedback ok';
    fb.textContent='Correct! Popping '+actual+'...';
  }
  arr[stackTop] = null;
  stackTop--;
  input.value='';
  renderArrayBoxes('l2-array', ARRAY_SIZE, {topIdx: stackTop});
  l2Rounds--;
  if(l2Rounds<=0){
    setTimeout(()=>{
      fb.className='feedback ok';
      fb.textContent = 'Level complete — notice the popped values are still sitting in the underlying array, just no longer reachable through top.';
      showNext();
    }, 400);
    document.querySelector('#panel .controls').style.display='none';
  }
}

/* ================= LEVEL 3: PUSH vs POP vs PEEK ================= */
const l3Scenarios = [
  {text:'You want to check the top value WITHOUT changing the stack.', answer:'PEEK'},
  {text:'You want to add a brand-new value to the stack.', answer:'PUSH'},
  {text:'You want to remove the most recently added item.', answer:'POP'},
  {text:'You want to look at what would come off next, but keep it there for now.', answer:'PEEK'},
  {text:'Undo just got triggered — you need to take the last action off the stack.', answer:'POP'},
];
let l3Streak = 0;
let l3UsedIndices = [];
const L3_NEEDED = 4;
function renderLevel3(){
  const p = document.getElementById('panel');
  p.innerHTML = `
    <div class="ltitle">Level 3 · Push vs Pop vs Peek</div>
    <div class="lsub">Pick the correct operation for each scenario. Get ${L3_NEEDED} in a row.</div>
    <div class="statline">STREAK <b id="l3-streak">0</b>/${L3_NEEDED}</div>
    <div class="prompt" id="l3-case"></div>
    <div class="choice-row" id="l3-choices"></div>
    <div class="feedback" id="l3-fb"></div>
    <button class="nextbtn" id="nextbtn" onclick="goNextLevel()">NEXT LEVEL &rarr;</button>`;
  l3Streak = 0;
  l3UsedIndices = [];
  nextL3();
}
function nextL3(){
  const { idx, q } = pickQuestion(l3Scenarios, l3UsedIndices);
  window.l3CurrentIdx = idx;
  window.l3Current = q;
  document.getElementById('l3-case').textContent = q.text;
  const box = document.getElementById('l3-choices');
  box.innerHTML='';
  shuffle(['PUSH','POP','PEEK']).forEach(opt=>{
    const btn = document.createElement('button');
    btn.className='choice';
    btn.textContent = opt;
    btn.onclick = ()=>answerL3(opt, btn);
    box.appendChild(btn);
  });
}
function answerL3(opt, btn){
  const correct = window.l3Current.answer;
  document.querySelectorAll('#l3-choices .choice').forEach(b=>{
    b.onclick=null;
    if(b.textContent===correct) b.classList.add('correct');
    else if(b===btn) b.classList.add('wrong');
  });
  l3UsedIndices.push(window.l3CurrentIdx);
  const fb = document.getElementById('l3-fb');
  if(opt===correct){
    l3Streak++;
    document.getElementById('l3-streak').textContent = l3Streak;
    fb.className='feedback ok'; fb.textContent='Correct.';
    if(l3Streak>=L3_NEEDED){
      setTimeout(()=>{ fb.textContent='Level complete.'; showNext(); },500);
      return;
    }
  } else {
    mistakes++;
    l3Streak = 0;
    document.getElementById('l3-streak').textContent = 0;
    fb.className='feedback bad'; fb.textContent='Not quite — the answer was '+correct+'.';
  }
  setTimeout(nextL3, 700);
}

/* ================= LEVEL 4: BALANCED BRACKETS ================= */
const l4Strings = ['{[()]}', '([)]', '(())', ')('];
const pairMap = {')':'(', ']':'[', '}':'{'};
let l4StrIdx = 0, l4CharIdx = 0, l4Bad = false;
function renderLevel4(){
  arr = new Array(ARRAY_SIZE).fill(null);
  stackTop = -1;
  l4StrIdx = 0;
  const p = document.getElementById('panel');
  p.innerHTML = `
    <div class="ltitle">Level 4 · Balanced Brackets</div>
    <div class="lsub">Push every opening bracket. When you see a closing bracket, pop and check it matches. The same array from Levels 1–2 is doing the work here.</div>
    <div class="bracket-str" id="l4-str"></div>
    <div id="l4-array"></div>
    <div class="controls">
      <button class="op primary" id="l4-push" onclick="l4Action('push')">PUSH (opening bracket)</button>
      <button class="op danger" id="l4-pop" onclick="l4Action('pop')">POP (closing bracket)</button>
    </div>
    <div class="feedback" id="l4-fb"></div>
    <div class="choice-row" id="l4-verdict" style="display:none;">
      <button class="choice" onclick="l4Verdict(true)">DECLARE BALANCED</button>
      <button class="choice" onclick="l4Verdict(false)">DECLARE NOT BALANCED</button>
    </div>
    <button class="nextbtn" id="nextbtn" onclick="goNextLevel()">NEXT LEVEL &rarr;</button>`;
  loadL4String();
}
function loadL4String(){
  arr = new Array(ARRAY_SIZE).fill(null);
  stackTop = -1;
  l4CharIdx = 0;
  l4Bad = false;
  const str = l4Strings[l4StrIdx];
  const strEl = document.getElementById('l4-str');
  strEl.innerHTML = str.split('').map((c,i)=>`<span id="l4-ch-${i}">${c}</span>`).join('');
  document.getElementById('l4-ch-0').classList.add('cur');
  document.getElementById('l4-fb').className='feedback hint';
  document.getElementById('l4-fb').textContent='String '+(l4StrIdx+1)+' of '+l4Strings.length;
  document.getElementById('l4-verdict').style.display='none';
  document.querySelector('#panel .controls').style.display='flex';
  renderArrayBoxes('l4-array', ARRAY_SIZE, {topIdx: stackTop});
}
function l4Action(action){
  if(l4Bad) return;
  const str = l4Strings[l4StrIdx];
  if(l4CharIdx>=str.length) return;
  const ch = str[l4CharIdx];
  const isOpening = '([{'.includes(ch);
  const fb = document.getElementById('l4-fb');

  if(isOpening && action!=='push'){ mistakes++; fb.className='feedback bad'; fb.textContent="That's an opening bracket — you need to PUSH."; return; }
  if(!isOpening && action!=='pop'){ mistakes++; fb.className='feedback bad'; fb.textContent="That's a closing bracket — you need to POP."; return; }

  if(action==='push'){
    stackTop++;
    arr[stackTop] = ch;
  } else {
    if(stackTop<0){
      fb.className='feedback bad';
      fb.textContent = 'Stack underflow! You tried to pop but the stack was already empty — NOT BALANCED.';
      finishL4String(false);
      return;
    }
    const popped = arr[stackTop];
    arr[stackTop] = null;
    stackTop--;
    if(pairMap[ch] !== popped){
      fb.className='feedback bad';
      fb.textContent = 'Mismatch! Popped "'+popped+'" but "'+ch+'" needed a "'+pairMap[ch]+'" — NOT BALANCED.';
      document.getElementById('l4-ch-'+l4CharIdx).classList.add('bad');
      finishL4String(false);
      return;
    }
  }
  document.getElementById('l4-ch-'+l4CharIdx).classList.remove('cur');
  document.getElementById('l4-ch-'+l4CharIdx).classList.add('done');
  renderArrayBoxes('l4-array', ARRAY_SIZE, {topIdx: stackTop});
  l4CharIdx++;
  if(l4CharIdx>=str.length){
    if(stackTop<0){
      fb.className='feedback ok';
      fb.textContent='All matched and the stack ended empty — BALANCED!';
      finishL4String(true);
    } else {
      fb.className='feedback hint';
      fb.textContent='End of string reached, but the stack is not empty — what does that mean?';
      document.getElementById('l4-verdict').style.display='flex';
      document.querySelector('#panel .controls').style.display='none';
    }
    return;
  }
  document.getElementById('l4-ch-'+l4CharIdx).classList.add('cur');
}
function l4Verdict(saidBalanced){
  const fb = document.getElementById('l4-fb');
  if(saidBalanced===false){
    fb.className='feedback ok';
    fb.textContent='Correct — leftover items on the stack mean unclosed brackets. NOT BALANCED.';
    finishL4String(false);
  } else {
    mistakes++;
    fb.className='feedback bad';
    fb.textContent='Leftover items on the stack means brackets were left open — that is NOT balanced.';
    finishL4String(false);
  }
}
function finishL4String(){
  l4Bad = true;
  document.querySelector('#panel .controls').style.display='none';
  document.getElementById('l4-verdict').style.display='none';
  l4StrIdx++;
  if(l4StrIdx>=l4Strings.length){
    setTimeout(()=>{
      document.getElementById('l4-fb').className='feedback ok';
      document.getElementById('l4-fb').textContent='Level complete — every check ran on the same push/pop stack.';
      showNext();
    }, 900);
  } else {
    setTimeout(loadL4String, 1100);
  }
}

/* ================= LEVEL 5: SORTED OR NOT? + SEARCH ================= */
const l5Sorted = [4, 9, 15, 23, 31, 40];
const l5Unsorted = [23, 4, 40, 9, 31, 15];
let l5Stage = 'ask', l5Target = 23, l5Lo=0, l5Hi=5, l5Steps=0, l5Ptr=0;
function renderLevel5(){
  arr = new Array(6).fill(null);
  const p = document.getElementById('panel');
  p.innerHTML = `
    <div class="ltitle">Level 5 · Sorted or Not? + Search</div>
    <div class="lsub">Whether an array is sorted decides which search you're allowed to use.</div>
    <div id="l5-array"></div>
    <div class="prompt" id="l5-prompt">Is this array sorted in ascending order?</div>
    <div class="choice-row" id="l5-choices">
      <button class="choice" onclick="answerSorted(true)">YES, sorted</button>
      <button class="choice" onclick="answerSorted(false)">NO, not sorted</button>
    </div>
    <div class="feedback" id="l5-fb"></div>
    <button class="nextbtn" id="nextbtn" onclick="goNextLevel()">NEXT LEVEL &rarr;</button>`;
  arr = [...l5Sorted];
  l5Stage='ask';
  renderArrayBoxes('l5-array', 6, {});
}
function answerSorted(saidSorted){
  const fb = document.getElementById('l5-fb');
  const actuallySorted = true; // we start with the sorted array
  document.getElementById('l5-choices').style.display='none';
  if(saidSorted===actuallySorted){
    fb.className='feedback ok';
    fb.textContent = "Correct, it's sorted — that means BINARY SEARCH is safe to use. Find the target: click the box you'd check first.";
  } else {
    mistakes++;
    fb.className='feedback bad';
    fb.textContent = "Actually it IS sorted — so we can use binary search. Find the target: click the box you'd check first.";
  }
  startBinarySearch();
}
function startBinarySearch(){
  l5Lo=0; l5Hi=arr.length-1; l5Steps=0; l5Target=31;
  const prompt = document.getElementById('l5-prompt');
  prompt.textContent = 'Binary Search: find '+l5Target+'. Click the box that is the MIDPOINT of the remaining range.';
  renderArrayBoxes('l5-array', 6, {onClick:onBinaryClick});
}
function onBinaryClick(i){
  const expectedMid = Math.floor((l5Lo+l5Hi)/2);
  const fb = document.getElementById('l5-fb');
  if(i!==expectedMid){
    mistakes++;
    fb.className='feedback bad';
    fb.textContent = 'Binary search must check the midpoint of the CURRENT range ('+l5Lo+'-'+l5Hi+'), which is index '+expectedMid+'.';
    return;
  }
  l5Steps++;
  const val = arr[i];
  if(val===l5Target){
    fb.className='feedback ok';
    fb.textContent = 'Found '+l5Target+' at index '+i+' in '+l5Steps+' comparison(s) — thanks to sorted data, that scales as O(log n).';
    setTimeout(startLinearSearch, 1400);
    return;
  }
  if(val<l5Target){ l5Lo = i+1; fb.textContent = val+' is too small — search the right half.'; }
  else { l5Hi = i-1; fb.textContent = val+' is too big — search the left half.'; }
  fb.className='feedback hint';
  document.getElementById('l5-prompt').textContent = 'Now click the midpoint of range '+l5Lo+'-'+l5Hi+'.';
}
function startLinearSearch(){
  arr = [...l5Unsorted];
  l5Ptr = 0;
  l5Target = 31;
  l5Steps = 0;
  document.getElementById('l5-prompt').textContent = 'This array is NOT sorted, so binary search would not work reliably. Linear Search for '+l5Target+': click boxes left to right.';
  document.getElementById('l5-fb').className='feedback hint';
  document.getElementById('l5-fb').textContent='';
  renderArrayBoxes('l5-array', 6, {onClick:onLinearClick});
}
function onLinearClick(i){
  const fb = document.getElementById('l5-fb');
  if(i!==l5Ptr){
    mistakes++;
    fb.className='feedback bad';
    fb.textContent = 'Linear search checks elements in order — click index '+l5Ptr+' next.';
    return;
  }
  l5Steps++;
  const val = arr[i];
  if(val===l5Target){
    fb.className='feedback ok';
    fb.textContent = 'Found '+l5Target+' at index '+i+' after '+l5Steps+' comparison(s) — with no order to exploit, this scales as O(n).';
    document.getElementById(document.getElementById('l5-array').id ? '' : '');
    setTimeout(()=>{ showNext(); }, 900);
    return;
  }
  fb.className='feedback hint';
  fb.textContent = 'Not a match, keep going.';
  l5Ptr++;
}

/* ================= LEVEL 6: SHIFT HAPPENS ================= */
const L6_SIZE = 6;
let l6InsertIdx = 2, l6InsertVal = 25, l6ShiftFrom = 4, l6Ready=false;
function renderLevel6(){
  arr = [10,20,30,40,50,null];
  l6InsertIdx = 2; l6InsertVal = 25; l6ShiftFrom = 4; l6Ready=false;
  const p = document.getElementById('panel');
  p.innerHTML = `
    <div class="ltitle">Level 6 · Shift Happens</div>
    <div class="lsub">Task: insert ${l6InsertVal} at index ${l6InsertIdx}. Push only ever touched the top slot (O(1)) — inserting in the MIDDLE means shifting everything after it one slot to the right, yourself, starting from the rightmost occupied box.</div>
    <div id="l6-array"></div>
    <div class="feedback" id="l6-fb">Click the rightmost filled box to shift it right.</div>
    <div class="controls" id="l6-insert-controls" style="display:none;">
      <input class="valinput" id="l6-input" value="${l6InsertVal}" disabled>
      <button class="op primary" onclick="doInsert6()">INSERT HERE</button>
    </div>
    <button class="nextbtn" id="nextbtn" onclick="goNextLevel()">NEXT LEVEL &rarr;</button>`;
  renderArrayBoxes('l6-array', L6_SIZE, {onClick:onShiftClick});
}
function onShiftClick(i){
  const fb = document.getElementById('l6-fb');
  if(i!==l6ShiftFrom){
    mistakes++;
    fb.className='feedback bad';
    fb.textContent = 'Shift from the rightmost occupied box first (index '+l6ShiftFrom+') or you\'ll overwrite data.';
    return;
  }
  arr[i+1] = arr[i];
  arr[i] = null;
  renderArrayBoxes('l6-array', L6_SIZE, {onClick:onShiftClick});
  fb.className='feedback ok';
  fb.textContent = 'Shifted index '+i+' \u2192 '+(i+1)+'.';
  l6ShiftFrom--;
  if(l6ShiftFrom < l6InsertIdx){
    document.getElementById('l6-insert-controls').style.display='flex';
    fb.textContent = 'Index '+l6InsertIdx+' is now free. Click INSERT to place '+l6InsertVal+'.';
    renderArrayBoxes('l6-array', L6_SIZE, {});
  }
}
function doInsert6(){
  arr[l6InsertIdx] = l6InsertVal;
  renderArrayBoxes('l6-array', L6_SIZE, {});
  const fb = document.getElementById('l6-fb');
  fb.className='feedback ok';
  fb.textContent = "Done — that took 3 shifts plus 1 insert for a single value. That shifting cost is why middle insertion is O(n), versus push's O(1).";
  document.getElementById('l6-insert-controls').style.display='none';
  showNext();
}

/* ================= FINAL ================= */
function renderFinal(){
  document.getElementById('levelbar').innerHTML='';
  const p = document.getElementById('panel');
  p.innerHTML = `
    <div class="final">
      <div class="ltitle">LAB COMPLETE</div>
      <div class="big">Arrays &amp; Stacks</div>
      <div class="lesson">
        <div><b>Push / Pop</b> touch only the <b>top</b> — O(1), no shifting needed.</div>
        <div style="margin-top:8px;"><b>Middle insertion/deletion</b> in a plain array costs O(n) — you felt this shifting boxes yourself in Level 6.</div>
        <div style="margin-top:8px;"><b>Binary search</b> needs sorted data and runs in O(log n); on unsorted data you're stuck with O(n) linear search.</div>
        <div style="margin-top:8px;"><b>Stack underflow</b> happens when you pop an empty stack — you saw this trigger a bracket mismatch in Level 4.</div>
      </div>
      <div class="statline" style="margin-top:10px;">MISTAKES <b>${mistakes}</b></div>
      <button class="op primary" onclick="location.reload()">RUN THE LAB AGAIN</button>
    </div>`;
}

renderLevel();
</script>
