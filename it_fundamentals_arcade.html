<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT Fundamentals — Defusal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b0e14; --panel:#151a22; --panel-edge:#2a323f; --steel:#8a929f;
    --red:#e2352f; --red-dim:#7a1e1b; --phosphor:#6df7c1; --gold:#f2c14e;
    --text:#eef1f5; --text-dim:#9aa2b1; --mono:'Space Mono', monospace; --sans:'Inter', sans-serif;
  }
  *{box-sizing:border-box;}
  body{ margin:0; background:#050608; color:var(--text); font-family:var(--sans); min-height:100vh; padding:14px; }
  .frame{ max-width:1020px;margin:0 auto; border:6px solid var(--red); border-radius:10px; background:#0a0c10; padding:16px; box-shadow:0 0 40px rgba(226,53,47,0.15); }
  .frame.critical{ animation:critical-pulse .6s infinite; }
  @keyframes critical-pulse{ 0%,100%{box-shadow:0 0 20px rgba(226,53,47,0.2);} 50%{box-shadow:0 0 55px rgba(226,53,47,0.55);} }
  .topbar{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; flex-wrap:wrap; gap:10px;}
  .logo{font-family:var(--mono); font-weight:700; line-height:1.1;}
  .logo .l1{font-size:20px; letter-spacing:.12em; color:var(--red);}
  .logo .l2{font-size:11px; letter-spacing:.14em; color:var(--text-dim);}
  a.homelink{font-family:var(--mono); font-size:11px; color:var(--text-dim); text-decoration:none; border:1px solid var(--panel-edge); border-radius:6px; padding:6px 10px;}
  a.homelink:hover{border-color:var(--red); color:var(--red);}

  .setup-title{font-family:var(--mono); font-size:13px; letter-spacing:.1em; color:var(--text-dim); text-align:center; margin:20px 0 14px;}
  .diffbtn{ display:block; width:100%; max-width:460px; margin:0 auto 12px; font-family:var(--mono); font-size:13px; text-align:left; background:var(--panel); border:1px solid var(--panel-edge); color:var(--text); border-radius:8px; padding:14px 16px; cursor:pointer; }
  .diffbtn b{display:block; font-size:15px; color:var(--phosphor); margin-bottom:3px;}
  .diffbtn:hover{border-color:var(--phosphor);}

  .timer-wrap{text-align:center; margin:6px auto 14px;}
  .timer{ display:inline-block; font-family:var(--mono); font-size:42px; font-weight:700; background:#03110a; color:var(--phosphor); border:2px solid #0e3a28; border-radius:8px; padding:6px 22px; letter-spacing:.06em; text-shadow:0 0 10px rgba(109,247,193,.6); }
  .timer.low{color:var(--red); text-shadow:0 0 14px rgba(226,53,47,.8); border-color:var(--red-dim);}
  .strikes{font-family:var(--mono); font-size:11px; color:var(--text-dim); margin-top:6px;}
  .strikes b{color:var(--red);}
  .solvedcount{font-family:var(--mono); font-size:11px; color:var(--phosphor); margin:6px 0 10px; text-align:center;}

  .sidenav{display:flex; justify-content:center; gap:6px; flex-wrap:wrap; margin-bottom:12px;}
  .sidebtn{ font-family:var(--mono); font-size:11px; background:var(--panel); border:1px solid var(--panel-edge); color:var(--steel); border-radius:6px; padding:7px 12px; cursor:pointer; }
  .sidebtn:hover{border-color:var(--gold); color:var(--gold);}
  .sidebtn.active{border-color:var(--phosphor); color:var(--phosphor);}
  .backnote{text-align:center; font-family:var(--mono); font-size:11px; color:var(--text-dim); margin-bottom:10px;}

  .sideSection{display:none;}
  .sideSection.active{display:block;}

  .module-grid{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; }
  @media (max-width:820px){ .module-grid{grid-template-columns:1fr 1fr;} }
  @media (max-width:560px){ .module-grid{grid-template-columns:1fr;} }

  .module{ position:relative; background:var(--panel); border:2px solid var(--panel-edge); border-radius:10px; padding:16px 14px 14px; min-height:190px; }
  .module.solved{border-color:#1f6b4c;}
  .led{ position:absolute; top:10px; left:10px; width:12px; height:12px; border-radius:50%; background:#4a0d0b; border:1px solid #300; box-shadow:inset 0 0 3px #000; }
  .led.on{ background:var(--phosphor); border-color:var(--phosphor); box-shadow:0 0 10px var(--phosphor); }
  .mtitle{ font-family:var(--mono); font-size:11.5px; letter-spacing:.06em; color:var(--steel); text-transform:uppercase; text-align:center; margin-bottom:10px; }
  .mbody{font-size:13px;}
  .progress-dots{display:flex; justify-content:center; gap:6px; margin-top:10px;}
  .dot{width:8px;height:8px;border-radius:50%; background:#333c48; border:1px solid #444e5e;}
  .dot.filled{background:var(--phosphor); border-color:var(--phosphor);}

  .shake{animation:shakeit .3s;}
  @keyframes shakeit{25%{transform:translateX(-5px);}75%{transform:translateX(5px);}}

  .wire-row{ display:flex; align-items:center; gap:8px; background:#0e1420; border:1px solid var(--panel-edge); border-radius:6px; padding:8px 10px; margin-bottom:6px; cursor:pointer; font-size:11.5px; }
  .wire-row:hover{border-color:var(--steel);}
  .wire-row.cut{opacity:.45; border-color:#1f6b4c; cursor:default; text-decoration:line-through; color:var(--phosphor);}
  .wire-dot{width:14px;height:6px;border-radius:3px; flex-shrink:0;}
  .w0{background:#c0392b;} .w1{background:#e2965f;} .w2{background:#f2c14e;} .w3{background:#6df7c1;} .w4{background:#5fa8e2;} .w5{background:#b57bd6;} .w6{background:#5fe2c0;}

  .conv-display{font-family:var(--mono); font-size:24px; text-align:center; color:var(--gold); margin-bottom:4px;}
  .conv-sub{text-align:center; font-size:11px; color:var(--text-dim); font-family:var(--mono); margin-bottom:10px;}
  .conv-input{width:100%; font-family:var(--mono); font-size:16px; text-align:center; background:#0e1420; border:1px solid var(--panel-edge); color:var(--text); border-radius:6px; padding:8px; margin-bottom:8px;}
  .conv-input:focus{outline:none; border-color:var(--phosphor);}

  .sort-name{font-family:var(--mono); font-size:15px; text-align:center; margin-bottom:12px; color:var(--text);}
  .bins2{display:grid; grid-template-columns:1fr 1fr; gap:6px;}
  .bins2.two{grid-template-columns:1fr 1fr;}
  .bin2{font-size:11px; font-weight:600; background:#0e1420; border:1px solid var(--panel-edge); border-radius:6px; padding:9px 4px; text-align:center; cursor:pointer;}
  .bin2:hover{border-color:var(--phosphor); color:var(--phosphor);}

  .case2{font-size:11.5px; line-height:1.5; margin-bottom:10px; color:var(--text);}
  .choice2{display:block; width:100%; text-align:left; font-size:11px; background:#0e1420; border:1px solid var(--panel-edge); color:var(--text); border-radius:6px; padding:8px 10px; margin-bottom:6px; cursor:pointer;}
  .choice2:hover{border-color:var(--steel);}
  .choice2.correct{border-color:var(--phosphor); color:var(--phosphor);}
  .choice2.wrong{border-color:var(--red); color:var(--red);}

  .connect-wrap{display:flex; gap:10px;}
  .connect-col{flex:1; display:flex; flex-direction:column; gap:6px;}
  .connect-item{ font-size:11px; background:#0e1420; border:1px solid var(--panel-edge); color:var(--text); border-radius:6px; padding:8px 6px; text-align:center; cursor:pointer; }
  .connect-item:hover{border-color:var(--steel);}
  .connect-item.selected{border-color:var(--gold); color:var(--gold);}
  .connect-item.solved{border-color:#1f6b4c; color:var(--phosphor); opacity:.6; cursor:default;}

  button.action{font-family:var(--sans); font-weight:600; font-size:13px; background:var(--steel); color:#111; border:none; border-radius:6px; padding:8px 12px; cursor:pointer; width:100%;}
  button.action:hover{background:#a9b2bf;}

  .overlay{ position:fixed; inset:0; background:rgba(3,4,6,0.92); display:none; align-items:center; justify-content:center; z-index:50; padding:20px; }
  .overlay.active{display:flex;}
  .overlay-card{ text-align:center; max-width:360px; width:100%; background:var(--panel); border:2px solid var(--panel-edge); border-radius:12px; padding:28px 20px; }
  .overlay-card.win{border-color:var(--phosphor);}
  .overlay-card.lose{border-color:var(--red);}
  .overlay-big{font-family:var(--mono); font-size:26px; margin-bottom:8px;}
  .overlay-card.win .overlay-big{color:var(--phosphor);}
  .overlay-card.lose .overlay-big{color:var(--red);}
  .overlay-sub{color:var(--text-dim); font-size:13px; margin-bottom:18px;}
</style>
</head>
<body>
<div class="frame" id="frame">
  <div class="topbar">
    <a class="homelink" href="index.html">&larr; HOME</a>
    <div class="logo" style="text-align:right;">
      <div class="l1">DEFUSAL</div>
      <div class="l2">IT FUNDAMENTALS</div>
    </div>
  </div>

  <div id="setup">
    <div class="setup-title">SELECT DIFFICULTY</div>
    <button class="diffbtn" onclick="startGame('easy')"><b>EASY</b>4 modules per side · front &amp; back · 2:00 on the clock</button>
    <button class="diffbtn" onclick="startGame('medium')"><b>MEDIUM</b>6 modules per side (3×2) · front &amp; back · 2:00 on the clock</button>
    <button class="diffbtn" onclick="startGame('hard')"><b>HARD</b>8 modules per side · front, back, left, right &amp; bottom · 7:00 on the clock — only the front shows the clock</button>
  </div>

  <div id="game" style="display:none;">
    <div class="sidenav" id="sideNav"></div>
    <div id="sidesContainer"></div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="overlay-card" id="overlay-card">
    <div class="overlay-big" id="overlay-big">—</div>
    <div class="overlay-sub" id="overlay-sub">—</div>
    <button class="action" onclick="location.reload()">TRY AGAIN</button>
  </div>
</div>

<script>
/* ================= UTIL ================= */
function shuffle(arr){ return [...arr].sort(()=>Math.random()-0.5); }
function fmt(t){ const m=Math.floor(t/60).toString().padStart(2,'0'); const s=Math.floor(t%60).toString().padStart(2,'0'); return m+':'+s; }

/* ================= CONTENT POOLS (reviewer doc: IT Fundamentals, plus general knowledge) ================= */

/* -- Computing Concepts: Data vs Information -- */
const dataInfoItems = [
  {text:'A list of unsorted exam scores: 85, 90, 78', answer:'Data'},
  {text:'A report showing the class average is 84.3%', answer:'Information'},
  {text:'Raw temperature readings: 21, 23, 19, 25', answer:'Data'},
  {text:'A forecast saying "expect rain this afternoon"', answer:'Information'},
  {text:'A spreadsheet cell containing just the number 45', answer:'Data'},
  {text:'A summary chart showing sales grew 12% this quarter', answer:'Information'},
  {text:'A stack of unlabeled survey response sheets', answer:'Data'},
  {text:'A processed report identifying the most common survey answer', answer:'Information'},
  {text:'Scanned text before it has been organized or analyzed', answer:'Data'},
  {text:"A student's report card showing computed final grades", answer:'Information'},
];

/* -- Computing Concepts: Hardware vs Software -- */
const hwSwItems = [
  {text:'Keyboard', answer:'Hardware'}, {text:'Monitor', answer:'Hardware'}, {text:'RAM stick', answer:'Hardware'},
  {text:'Printer', answer:'Hardware'}, {text:'Motherboard', answer:'Hardware'}, {text:'Hard Disk Drive', answer:'Hardware'},
  {text:'Webcam', answer:'Hardware'}, {text:'Graphics Card', answer:'Hardware'},
  {text:'Microsoft Word', answer:'Software'}, {text:'Windows OS', answer:'Software'}, {text:'Google Chrome', answer:'Software'},
  {text:'Antivirus Program', answer:'Software'}, {text:'Photoshop', answer:'Software'}, {text:'Spotify App', answer:'Software'},
  {text:'Zoom', answer:'Software'}, {text:'A Spreadsheet Application', answer:'Software'},
];

/* -- Computing Concepts: IPO Cycle (classify the activity) -- */
const ipoActivities = [
  {text:'Typing on a keyboard', cat:'Input'}, {text:'Clicking a mouse button', cat:'Input'}, {text:'Scanning a document', cat:'Input'},
  {text:'The CPU performing a calculation', cat:'Process'}, {text:'Sorting a list of numbers', cat:'Process'}, {text:'Converting raw data into a report', cat:'Process'},
  {text:'Displaying text on a monitor', cat:'Output'}, {text:'Printing a document', cat:'Output'}, {text:'Playing sound through speakers', cat:'Output'},
  {text:'Saving a file to the hard drive', cat:'Storage'}, {text:'Loading a saved file back from disk', cat:'Storage'},
];

/* -- Computing Concepts: Unit Ladder (click in order) -- */
const unitLadder = ['Bit','Byte','KB','MB','GB','TB','PB'];

/* -- History of Computers: Connect the Wires (generation <-> technology) -- */
const historyPairs = [
  {gen:'1st Generation', tech:'Vacuum Tubes'},
  {gen:'2nd Generation', tech:'Transistors'},
  {gen:'3rd Generation', tech:'Integrated Circuits (ICs)'},
  {gen:'4th Generation', tech:'Microprocessors'},
  {gen:'5th Generation', tech:'Artificial Intelligence'},
];

/* -- History of Computers: Name the Pioneer -- */
const pioneerNames = ['Charles Babbage','Ada Lovelace','Alan Turing','John von Neumann'];
const pioneerQuestions = [
  {text:'Known as the "father of the computer" for designing the Analytical Engine.', answer:'Charles Babbage'},
  {text:'Known as the first programmer, for writing the first algorithm intended for a machine.', answer:'Ada Lovelace'},
  {text:'Developed the Turing Machine and the theory of computability.', answer:'Alan Turing'},
  {text:'Proposed the stored-program architecture used by most modern computers.', answer:'John von Neumann'},
];

/* -- Number Systems: base conversion (bin/oct/dec/hex) + binary addition -- */
const bases = {bin:2, dec:10, hex:16, oct:8};
const baseNames = {bin:'binary', dec:'decimal', hex:'hexadecimal', oct:'octal'};

/* -- Elements of Computer and Communication Systems -- */
const sortItems = [
  {name:'Keyboard', cat:'Input'}, {name:'Mouse', cat:'Input'}, {name:'Scanner', cat:'Input'},
  {name:'Monitor', cat:'Output'}, {name:'Printer', cat:'Output'}, {name:'Speakers', cat:'Output'},
  {name:'CPU', cat:'Processing'},
  {name:'RAM (Main Memory)', cat:'Memory'},
  {name:'HDD (Secondary Storage)', cat:'Storage'}, {name:'SSD (Secondary Storage)', cat:'Storage'},
];
const elementsMCQuestions = [
  {text:'The main circuit board that connects the CPU, RAM, and expansion buses is called the:', options:['Motherboard','Chipset','Power Supply','Case'], answer:'Motherboard'},
  {text:'Which bus carries the actual data being transferred between components?', options:['Data bus','Address bus','Control bus','System bus'], answer:'Data bus'},
  {text:'Which bus carries memory addresses, telling the CPU where to read or write?', options:['Data bus','Address bus','Control bus','Feedback bus'], answer:'Address bus'},
  {text:'Which bus carries control signals such as read/write commands?', options:['Data bus','Address bus','Control bus','Noise bus'], answer:'Control bus'},
  {text:'In a communication system, the person or device that originates the message is the:', options:['Sender','Receiver','Encoder','Decoder'], answer:'Sender'},
  {text:'The component that converts a message into a signal suitable for transmission is the:', options:['Sender','Receiver','Encoder','Decoder'], answer:'Encoder'},
  {text:'The component that converts a received signal back into an understandable message is the:', options:['Sender','Encoder','Decoder','Channel'], answer:'Decoder'},
  {text:'The physical path data travels through (e.g. cable, air) is called the:', options:['Channel / transmission medium','Encoder','Feedback','Noise'], answer:'Channel / transmission medium'},
  {text:'Unwanted interference that can distort a message during transmission is called:', options:['Feedback','Noise','Encoding','Bandwidth'], answer:'Noise'},
  {text:'Information sent back to the sender confirming a message was received is called:', options:['Noise','Channel','Feedback','Encoding'], answer:'Feedback'},
];

/* -- IT Social and Professional Issues: laws, IP, licensing, ethics, cybersecurity & malware -- */
const ethicsQuestions = [
  {text:'Which type of intellectual property protection covers an original literary or artistic work?', options:['Copyright','Patent','Trademark','Data Privacy Act'], answer:'Copyright'},
  {text:'Which type of intellectual property protection covers a new invention or process?', options:['Copyright','Patent','Trademark','Cybercrime Law'], answer:'Patent'},
  {text:'Which type of intellectual property protection covers a brand name or logo?', options:['Copyright','Patent','Trademark','Software License'], answer:'Trademark'},
  {text:'Software you must pay for, with closed/inaccessible source code, is called:', options:['Freeware','Shareware','Open-source','Proprietary / commercial'], answer:'Proprietary / commercial'},
  {text:'Software that is free to use but generally cannot be modified (closed source) is called:', options:['Freeware','Shareware','Open-source','Proprietary'], answer:'Freeware'},
  {text:'Software you can try for free but must pay for after a trial period is called:', options:['Freeware','Shareware','Open-source','Proprietary'], answer:'Shareware'},
  {text:'Software distributed under licenses like GPL or MIT, where source code is open to view and modify, is called:', options:['Freeware','Shareware','Open-source','Proprietary'], answer:'Open-source'},
  {text:'In the Philippines, RA 10173 — governing the collection and processing of personal data — is known as the:', options:['Data Privacy Act of 2012','Cybercrime Prevention Act of 2012','Copyright Law','Software License Agreement'], answer:'Data Privacy Act of 2012'},
  {text:'In the Philippines, RA 10175 — covering hacking, identity theft, and cyber-libel — is known as the:', options:['Data Privacy Act of 2012','Cybercrime Prevention Act of 2012','Patent Law','Freeware Agreement'], answer:'Cybercrime Prevention Act of 2012'},
  {text:'The professional code emphasizing honesty, competence, confidentiality, and avoiding harm for IT practitioners is the:', options:['ACM/IEEE Code of Ethics','Data Privacy Act','Cybercrime Prevention Act','Open-Source License'], answer:'ACM/IEEE Code of Ethics'},
  {text:'The gap between those with access to modern ICT and those without is called the:', options:['Digital Divide','Data Privacy Gap','Cyber Gap','Bandwidth Divide'], answer:'Digital Divide'},
  {text:'Which type of malware disguises itself as legitimate software to trick users into installing it?', options:['Virus','Worm','Trojan','Firewall'], answer:'Trojan'},
  {text:'Which type of malware self-replicates and spreads across networks WITHOUT needing a host file or user action?', options:['Virus','Worm','Trojan','Spyware'], answer:'Worm'},
  {text:'Which type of malware attaches itself to files and needs a host file plus user action to spread?', options:['Virus','Worm','Ransomware','Firewall'], answer:'Virus'},
  {text:"Malware that encrypts a victim's files and demands payment to unlock them is called:", options:['Spyware','Ransomware','Worm','Firewall'], answer:'Ransomware'},
  {text:"Malware that secretly monitors a user's activity is called:", options:['Spyware','Ransomware','Trojan','Firewall'], answer:'Spyware'},
  {text:'An attack where someone poses as a trustworthy source (often via email) to trick you into revealing sensitive info is called:', options:['Phishing','Firewall','Encryption','Patch'], answer:'Phishing'},
  {text:'Manipulating people — not computer systems — into revealing confidential information is called:', options:['Social Engineering','Encryption','Firewalling','Patching'], answer:'Social Engineering'},
  {text:'Confidentiality, Integrity, and Availability — the three core goals of information security — are together known as the:', options:['CIA Triad','IPO Cycle','OSI Model','Digital Divide'], answer:'CIA Triad'},
  {text:'Software or hardware that filters and monitors incoming/outgoing network traffic is called a:', options:['Firewall','Trojan','Encryption Key','Bootloader'], answer:'Firewall'},
  {text:"Converting data into a coded form to protect its confidentiality is called:", options:['Encryption','Phishing','Social Engineering','Patching'], answer:'Encryption'},
  {text:'An attack that floods a server with traffic to make it unavailable to legitimate users is called a:', options:['Phishing Attack','DDoS Attack','Ransomware Attack','Firewall Attack'], answer:'DDoS Attack'},
  {text:'Which of these is NOT a type of malware?', options:['Trojan','Firewall','Worm','Ransomware'], answer:'Firewall'},
];

/* ================= GLOBAL BOMB STATE ================= */
const ALL_TYPES = ['data_info','hw_sw','ipo','units','history_wires','history_pioneer','numbers','elements','issues'];
const typeLabels = {
  data_info:'Computing Concepts — Data or Info',
  hw_sw:'Computing Concepts — Hardware or Software',
  ipo:'Computing Concepts — IPO Cycle',
  units:'Computing Concepts — Unit Ladder',
  history_wires:'History — Connect the Wires',
  history_pioneer:'History — Name the Pioneer',
  numbers:'Number Systems — Lock',
  elements:'Elements of a System — Switches',
  issues:'Social &amp; Professional Issues — Dial',
};

let timeLeft = 0, mistakes = 0, bombTimer = null;
let moduleState = {};
let allModuleIds = [];
let solvedCount = 0;
let usedWireSets = [];
let instanceCounters = {};
ALL_TYPES.forEach(t=>instanceCounters[t]=0);
const romanSuffix = ['', ' II', ' III', ' IV', ' V', ' VI'];

function updateTimerDisplay(){
  const el = document.getElementById('timer');
  if(!el) return;
  el.textContent = fmt(timeLeft);
  el.classList.toggle('low', timeLeft<=30);
  document.getElementById('frame').classList.toggle('critical', timeLeft<=15);
}
function startBomb(){
  updateTimerDisplay();
  bombTimer = setInterval(()=>{
    timeLeft--;
    if(timeLeft<=0){ timeLeft=0; updateTimerDisplay(); explode(); return; }
    updateTimerDisplay();
  },1000);
}
function penalize(id){
  mistakes++;
  timeLeft = Math.max(0, timeLeft-10);
  updateTimerDisplay();
  const el = document.getElementById(id);
  if(el){ el.classList.add('shake'); setTimeout(()=>el.classList.remove('shake'),300); }
  if(timeLeft<=0) explode();
}
function updateSolvedCounts(){
  document.querySelectorAll('.solvedcount').forEach(el=>{
    el.textContent = 'SOLVED '+solvedCount+'/'+allModuleIds.length;
  });
}
function markSolved(id){
  if(moduleState[id].solved) return;
  moduleState[id].solved = true;
  document.getElementById(id+'-led').classList.add('on');
  document.getElementById(id).classList.add('solved');
  solvedCount++;
  updateSolvedCounts();
  if(solvedCount>=allModuleIds.length) defuse();
}
function explode(){
  clearInterval(bombTimer);
  const card = document.getElementById('overlay-card');
  card.className = 'overlay-card lose';
  document.getElementById('overlay-big').textContent = 'BOOM 💥';
  document.getElementById('overlay-sub').textContent = 'The clock ran out with '+(allModuleIds.length-solvedCount)+' module(s) still live. Mistakes made: '+mistakes+'.';
  document.getElementById('overlay').classList.add('active');
}
function defuse(){
  clearInterval(bombTimer);
  const card = document.getElementById('overlay-card');
  card.className = 'overlay-card win';
  document.getElementById('overlay-big').textContent = 'DEFUSED';
  document.getElementById('overlay-sub').textContent = 'All '+allModuleIds.length+' modules cleared with '+fmt(timeLeft)+' left on the clock, and '+mistakes+' mistake(s) made.';
  document.getElementById('overlay').classList.add('active');
}
function renderDots(containerId, count, filled){
  const c = document.getElementById(containerId);
  if(!c) return;
  c.innerHTML='';
  for(let i=0;i<count;i++){
    const d = document.createElement('span');
    d.className = 'dot'+(i<filled?' filled':'');
    c.appendChild(d);
  }
}
function switchSide(name){
  document.querySelectorAll('.sideSection').forEach(s=>s.classList.remove('active'));
  document.getElementById('side-'+name).classList.add('active');
  document.querySelectorAll('.sidebtn').forEach(b=>b.classList.toggle('active', b.dataset.side===name));
}

/* ================= MODULE SHELL ================= */
function moduleShell(id, label){
  const div = document.createElement('div');
  div.className='module';
  div.id=id;
  div.innerHTML = `<div class="led" id="${id}-led"></div><div class="mtitle">${label}</div><div class="mbody" id="${id}-body"></div>`;
  return div;
}
function createModule(type, gridEl){
  const num = ++instanceCounters[type];
  const id = type+'-'+num;
  const label = typeLabels[type] + (romanSuffix[num-1] || ' '+num);
  const el = moduleShell(id, label);
  gridEl.appendChild(el);
  allModuleIds.push(id);
  moduleState[id] = {type, solved:false};
  const initFns = {
    data_info: initDataInfo, hw_sw: initHwSw, ipo: initIpo, units: initUnits,
    history_wires: initHistoryWires, history_pioneer: initPioneer,
    numbers: initConv, elements: initSort, issues: initEthics,
  };
  initFns[type](id);
}

/* ================= DATA VS INFORMATION ================= */
const TWO_NEEDED = 3;
function nextDataInfo(id){

/* ================= UNIT LADDER (click in order) ================= */
function initUnits(id){
  const order = shuffle(unitLadder.map((u,i)=>({label:u, rank:i})));
  moduleState[id].order = order;
  moduleState[id].pointer = 0;
  const body = document.getElementById(id+'-body');
  body.innerHTML = `<div id="${id}-list"></div>`;
  const list = document.getElementById(id+'-list');
  order.forEach((u, idx)=>{
    const row = document.createElement('div');
    row.className='wire-row';
    row.innerHTML = `<span class="wire-dot w${idx%7}"></span><span>${u.label}</span>`;
    row.onclick = ()=>clickUnit(id, idx);
    list.appendChild(row);
  });
}
function clickUnit(id, idx){
  const st = moduleState[id];
  if(st.solved) return;
  const rows = document.querySelectorAll('#'+id+'-list .wire-row');
  const row = rows[idx];
  if(row.classList.contains('cut')) return;
  if(st.order[idx].rank === st.pointer){
    row.classList.add('cut');
    st.pointer++;
    if(st.pointer>=st.order.length) markSolved(id);
  } else {
    penalize(id);
    rows.forEach(r=>r.classList.remove('cut'));
    st.pointer = 0;
  }
}

/* ================= HISTORY: CONNECT THE WIRES ================= */
function initHistoryWires(id){
  const left = shuffle(historyPairs.map((p,i)=>({label:p.gen, pairIdx:i})));
  const right = shuffle(historyPairs.map((p,i)=>({label:p.tech, pairIdx:i})));
  moduleState[id].left = left;
  moduleState[id].right = right;
  moduleState[id].selectedLeft = null;
  moduleState[id].solvedPairs = 0;
  const body = document.getElementById(id+'-body');
  body.innerHTML = `<div class="connect-wrap">
      <div class="connect-col" id="${id}-left"></div>
      <div class="connect-col" id="${id}-right"></div>
    </div>`;
  const leftCol = document.getElementById(id+'-left');
  left.forEach((item,idx)=>{
    const div = document.createElement('div');
    div.className='connect-item';
    div.textContent = item.label;
    div.onclick = ()=>selectLeft(id, idx);
    leftCol.appendChild(div);
  });
  const rightCol = document.getElementById(id+'-right');
  right.forEach((item,idx)=>{
    const div = document.createElement('div');
    div.className='connect-item';
    div.textContent = item.label;
    div.onclick = ()=>selectRight(id, idx);
    rightCol.appendChild(div);
  });
}
function selectLeft(id, idx){
  const st = moduleState[id];
  if(st.solved) return;
  const leftEls = document.querySelectorAll('#'+id+'-left .connect-item');
  if(leftEls[idx].classList.contains('solved')) return;
  leftEls.forEach(e=>e.classList.remove('selected'));
  leftEls[idx].classList.add('selected');
  st.selectedLeft = idx;
}
function selectRight(id, idx){
  const st = moduleState[id];
  if(st.solved || st.selectedLeft===null) return;
  const rightEls = document.querySelectorAll('#'+id+'-right .connect-item');
  if(rightEls[idx].classList.contains('solved')) return;
  const leftEls = document.querySelectorAll('#'+id+'-left .connect-item');
  const leftPick = st.left[st.selectedLeft];
  const rightPick = st.right[idx];
  if(leftPick.pairIdx === rightPick.pairIdx){
    leftEls[st.selectedLeft].classList.add('solved');
    leftEls[st.selectedLeft].classList.remove('selected');
    rightEls[idx].classList.add('solved');
    st.selectedLeft = null;
    st.solvedPairs++;
    if(st.solvedPairs>=historyPairs.length) markSolved(id);
  } else {
    penalize(id);
    leftEls.forEach(e=>e.classList.remove('selected'));
    st.selectedLeft = null;
  }
}

const CONV_NEEDED = 3;
function nextConvRound(id){
  if(Math.random() < 0.7){
    const num = Math.floor(Math.random()*250)+1;
    const pairs=[['dec','bin'],['bin','dec'],['dec','hex'],['hex','dec'],['bin','hex'],['hex','bin'],['dec','oct'],['oct','dec']];
    const [from,to] = pairs[Math.floor(Math.random()*pairs.length)];
    document.getElementById(id+'-display').textContent = num.toString(bases[from]).toUpperCase();
    document.getElementById(id+'-sub').textContent = baseNames[from]+' \u2192 convert to '+baseNames[to];
    moduleState[id].answer = num.toString(bases[to]);
  } else {
    const a = Math.floor(Math.random()*20)+1;
    const b = Math.floor(Math.random()*20)+1;
    document.getElementById(id+'-display').textContent = a.toString(2)+' + '+b.toString(2);
    document.getElementById(id+'-sub').textContent = 'binary addition \u2192 give the sum in binary';
    moduleState[id].answer = (a+b).toString(2);
  }
  document.getElementById(id+'-input').value='';
}
function initConv(id){
  moduleState[id].streak = 0;
  const body = document.getElementById(id+'-body');
  body.innerHTML = `
    <div class="conv-display" id="${id}-display">—</div>
    <div class="conv-sub" id="${id}-sub">convert to —</div>

    <button class="action" id="${id}-btn">ENTER</button>
    <div class="progress-dots" id="${id}-dots"></div>`;
  document.getElementById(id+'-btn').onclick = ()=>submitConv(id);

  nextConvRound(id);
}
function submitConv(id){
  const st = moduleState[id];

  const val = document.getElementById(id+'-input').value.trim().toLowerCase();
  if(val === st.answer.toLowerCase()){

  } else {
    st.streak = 0;
    renderDots(id+'-dots', CONV_NEEDED, 0);
    penalize(id);
  }
  nextConvRound(id);
}

/* ================= GAME START ================= */
const DIFFICULTY_CONFIG = {
  easy:   {sides:['front','back'], perSide:4, time:120},
  medium: {sides:['front','back'], perSide:6, time:120},
  hard:   {sides:['front','back','left','right','bottom'], perSide:8, time:420},
};

function buildSideSection(sideName, isFirst){
  const section = document.createElement('div');
  section.className = 'sideSection'+(isFirst?' active':'');
  section.id = 'side-'+sideName;
  let html = '';
  if(sideName==='front'){
    html += `<div class="timer-wrap">
      <div class="timer" id="timer">00:00</div>
      <div class="strikes">MISTAKES COST <b>-10s</b> EACH</div>
    </div>`;
  } else {
    html += `<div class="backnote">${sideName.toUpperCase()} — no clock here. Return to the FRONT to check the time.</div>`;
  }
  html += `<div class="solvedcount">SOLVED 0/0</div>`;
  html += `<div class="module-grid" id="grid-${sideName}"></div>`;
  section.innerHTML = html;
  return section;
}

function startGame(difficulty){
  document.getElementById('setup').style.display='none';
  document.getElementById('game').style.display='block';

  const cfg = DIFFICULTY_CONFIG[difficulty];
  timeLeft = cfg.time;

  const sidesContainer = document.getElementById('sidesContainer');
  sidesContainer.innerHTML = '';
  const nav = document.getElementById('sideNav');
  nav.innerHTML = '';

  cfg.sides.forEach((sideName, i)=>{
    const section = buildSideSection(sideName, i===0);
    sidesContainer.appendChild(section);

    const navBtn = document.createElement('button');
    navBtn.className = 'sidebtn'+(i===0?' active':'');
    navBtn.dataset.side = sideName;
    navBtn.textContent = sideName.toUpperCase();
    navBtn.onclick = ()=>switchSide(sideName);
    nav.appendChild(navBtn);

    const gridEl = document.getElementById('grid-'+sideName);
    const sideTypes = shuffle(ALL_TYPES).slice(0, cfg.perSide);
    sideTypes.forEach(t=>createModule(t, gridEl));
  });

  updateSolvedCounts();
  startBomb();
}
