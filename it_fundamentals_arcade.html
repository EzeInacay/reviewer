<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT Fundamentals — Defusal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b0e14;
    --panel:#151a22;
    --panel-edge:#2a323f;
    --steel:#8a929f;
    --red:#e2352f;
    --red-dim:#7a1e1b;
    --phosphor:#6df7c1;
    --gold:#f2c14e;
    --text:#eef1f5;
    --text-dim:#9aa2b1;
    --mono:'Space Mono', monospace;
    --sans:'Inter', sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:#050608;
    color:var(--text);
    font-family:var(--sans);
    min-height:100vh;
    padding:14px;
  }
  .frame{
    max-width:820px;margin:0 auto;
    border:6px solid var(--red);
    border-radius:10px;
    background:#0a0c10;
    padding:16px;
    box-shadow:0 0 40px rgba(226,53,47,0.15);
    transition:box-shadow .3s;
  }
  .frame.critical{
    animation:critical-pulse .6s infinite;
  }
  @keyframes critical-pulse{
    0%,100%{box-shadow:0 0 20px rgba(226,53,47,0.2);}
    50%{box-shadow:0 0 55px rgba(226,53,47,0.55);}
  }

  .topbar{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; flex-wrap:wrap; gap:10px;}
  .logo{font-family:var(--mono); font-weight:700; line-height:1.1;}
  .logo .l1{font-size:20px; letter-spacing:.12em; color:var(--red);}
  .logo .l2{font-size:11px; letter-spacing:.14em; color:var(--text-dim);}
  a.homelink{font-family:var(--mono); font-size:11px; color:var(--text-dim); text-decoration:none; border:1px solid var(--panel-edge); border-radius:6px; padding:6px 10px;}
  a.homelink:hover{border-color:var(--red); color:var(--red);}

  .timer-wrap{text-align:center; margin:6px auto 18px;}
  .timer{
    display:inline-block;
    font-family:var(--mono); font-size:42px; font-weight:700;
    background:#03110a; color:var(--phosphor);
    border:2px solid #0e3a28; border-radius:8px;
    padding:6px 22px;
    letter-spacing:.06em;
    text-shadow:0 0 10px rgba(109,247,193,.6);
  }
  .timer.low{color:var(--red); text-shadow:0 0 14px rgba(226,53,47,.8); border-color:var(--red-dim);}
  .strikes{font-family:var(--mono); font-size:12px; color:var(--text-dim); margin-top:6px;}
  .strikes b{color:var(--red);}

  .module-grid{
    display:grid; grid-template-columns:1fr 1fr; gap:14px;
  }
  @media (max-width:560px){ .module-grid{grid-template-columns:1fr;} }

  .module{
    position:relative;
    background:var(--panel);
    border:2px solid var(--panel-edge);
    border-radius:10px;
    padding:16px 14px 14px;
    min-height:190px;
  }
  .module.solved{border-color:#1f6b4c;}
  .led{
    position:absolute; top:10px; left:10px;
    width:12px; height:12px; border-radius:50%;
    background:#4a0d0b; border:1px solid #300;
    box-shadow:inset 0 0 3px #000;
  }
  .led.on{
    background:var(--phosphor);
    border-color:var(--phosphor);
    box-shadow:0 0 10px var(--phosphor);
  }
  .mtitle{
    font-family:var(--mono); font-size:12px; letter-spacing:.08em;
    color:var(--steel); text-transform:uppercase;
    text-align:center; margin-bottom:10px;
  }
  .mbody{font-size:13px;}
  .progress-dots{display:flex; justify-content:center; gap:6px; margin-top:10px;}
  .dot{width:8px;height:8px;border-radius:50%; background:#333c48; border:1px solid #444e5e;}
  .dot.filled{background:var(--phosphor); border-color:var(--phosphor);}

  .shake{animation:shakeit .3s;}
  @keyframes shakeit{25%{transform:translateX(-5px);}75%{transform:translateX(5px);}}

  /* wires module */
  .wire-row{
    display:flex; align-items:center; gap:8px;
    background:#0e1420; border:1px solid var(--panel-edge); border-radius:6px;
    padding:8px 10px; margin-bottom:6px; cursor:pointer; font-size:12px;
  }
  .wire-row:hover{border-color:var(--steel);}
  .wire-row.cut{opacity:.45; border-color:#1f6b4c; cursor:default; text-decoration:line-through; color:var(--phosphor);}
  .wire-dot{width:14px;height:6px;border-radius:3px; flex-shrink:0;}
  .w0{background:#c0392b;} .w1{background:#e2965f;} .w2{background:#f2c14e;} .w3{background:#6df7c1;} .w4{background:#5fa8e2;}

  /* number lock */
  .conv-display{font-family:var(--mono); font-size:26px; text-align:center; color:var(--gold); margin-bottom:4px;}
  .conv-sub{text-align:center; font-size:11px; color:var(--text-dim); font-family:var(--mono); margin-bottom:10px;}
  .conv-input{width:100%; font-family:var(--mono); font-size:16px; text-align:center; background:#0e1420; border:1px solid var(--panel-edge); color:var(--text); border-radius:6px; padding:8px; margin-bottom:8px;}
  .conv-input:focus{outline:none; border-color:var(--phosphor);}

  /* system switches */
  .sort-name{font-family:var(--mono); font-size:16px; text-align:center; margin-bottom:12px; color:var(--text);}
  .bins2{display:grid; grid-template-columns:1fr 1fr; gap:6px;}
  .bin2{font-size:11px; font-weight:600; background:#0e1420; border:1px solid var(--panel-edge); border-radius:6px; padding:9px 4px; text-align:center; cursor:pointer;}
  .bin2:hover{border-color:var(--phosphor); color:var(--phosphor);}

  /* ethics */
  .case2{font-size:12px; line-height:1.5; margin-bottom:10px; color:var(--text);}
  .choice2{display:block; width:100%; text-align:left; font-size:11.5px; background:#0e1420; border:1px solid var(--panel-edge); color:var(--text); border-radius:6px; padding:8px 10px; margin-bottom:6px; cursor:pointer;}
  .choice2:hover{border-color:var(--steel);}
  .choice2.correct{border-color:var(--phosphor); color:var(--phosphor);}
  .choice2.wrong{border-color:var(--red); color:var(--red);}

  button.action{font-family:var(--sans); font-weight:600; font-size:13px; background:var(--steel); color:#111; border:none; border-radius:6px; padding:8px 12px; cursor:pointer; width:100%;}
  button.action:hover{background:#a9b2bf;}

  /* overlay */
  .overlay{
    position:fixed; inset:0; background:rgba(3,4,6,0.92);
    display:none; align-items:center; justify-content:center; z-index:50; padding:20px;
  }
  .overlay.active{display:flex;}
  .overlay-card{
    text-align:center; max-width:360px; width:100%;
    background:var(--panel); border:2px solid var(--panel-edge); border-radius:12px; padding:28px 20px;
  }
  .overlay-card.win{border-color:var(--phosphor);}
  .overlay-card.lose{border-color:var(--red);}
  .overlay-big{font-family:var(--mono); font-size:26px; margin-bottom:8px;}
  .overlay-card.win .overlay-big{color:var(--phosphor);}
  .overlay-card.lose .overlay-big{color:var(--red);}
  .overlay-sub{color:var(--text-dim); font-size:13px; margin-bottom:18px;}
</style>
</head>
<body>
<div class="frame" id="frame">
  <div class="topbar">
    <a class="homelink" href="index.html">&larr; HOME</a>
    <div class="logo" style="text-align:right;">
      <div class="l1">DEFUSAL</div>
      <div class="l2">IT FUNDAMENTALS</div>
    </div>
  </div>

  <div class="timer-wrap">
    <div class="timer" id="timer">05:00</div>
    <div class="strikes">MISTAKES COST <b>-10s</b> EACH · SOLVE ALL 4 MODULES TO DEFUSE</div>
  </div>

  <div class="module-grid">
    <!-- MODULE 1: HISTORY WIRES -->
    <div class="module" id="mod-wires">
      <div class="led" id="led-wires"></div>
      <div class="mtitle">History — Cut In Order</div>
      <div class="mbody">
        <div id="wire-list"></div>
      </div>
    </div>

    <!-- MODULE 2: NUMBER LOCK -->
    <div class="module" id="mod-conv">
      <div class="led" id="led-conv"></div>
      <div class="mtitle">Number Systems — Lock</div>
      <div class="mbody">
        <div class="conv-display" id="conv-display">—</div>
        <div class="conv-sub" id="conv-sub">convert to —</div>
        <input class="conv-input" id="conv-input" placeholder="answer" autocomplete="off" onkeydown="if(event.key==='Enter')submitConv()">
        <button class="action" onclick="submitConv()">ENTER</button>
        <div class="progress-dots" id="conv-dots"></div>
      </div>
    </div>

    <!-- MODULE 3: SYSTEM SWITCHES -->
    <div class="module" id="mod-sort">
      <div class="led" id="led-sort"></div>
      <div class="mtitle">System Elements — Switches</div>
      <div class="mbody">
        <div class="sort-name" id="sort-name">—</div>
        <div class="bins2">
          <div class="bin2" onclick="answerSort('Input')">INPUT</div>
          <div class="bin2" onclick="answerSort('Output')">OUTPUT</div>
          <div class="bin2" onclick="answerSort('Processing')">PROCESSING</div>
          <div class="bin2" onclick="answerSort('Storage')">STORAGE</div>
        </div>
        <div class="progress-dots" id="sort-dots"></div>
      </div>
    </div>

    <!-- MODULE 4: LAW DIAL -->
    <div class="module" id="mod-ethics">
      <div class="led" id="led-ethics"></div>
      <div class="mtitle">Professional Issues — Dial</div>
      <div class="mbody">
        <div class="case2" id="eth-case">—</div>
        <div id="eth-choices"></div>
        <div class="progress-dots" id="eth-dots"></div>
      </div>
    </div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="overlay-card" id="overlay-card">
    <div class="overlay-big" id="overlay-big">—</div>
    <div class="overlay-sub" id="overlay-sub">—</div>
    <button class="action" onclick="location.reload()">TRY AGAIN</button>
  </div>
</div>

<script>
/* ================= GLOBAL BOMB STATE ================= */
let timeLeft = 300; // seconds
let mistakes = 0;
let bombTimer = null;
const solved = {wires:false, conv:false, sort:false, ethics:false};

function fmt(t){
  const m = Math.floor(t/60).toString().padStart(2,'0');
  const s = Math.floor(t%60).toString().padStart(2,'0');
  return m+':'+s;
}
function updateTimerDisplay(){
  const el = document.getElementById('timer');
  el.textContent = fmt(timeLeft);
  el.classList.toggle('low', timeLeft<=60);
  document.getElementById('frame').classList.toggle('critical', timeLeft<=30);
}
function startBomb(){
  updateTimerDisplay();
  bombTimer = setInterval(()=>{
    timeLeft--;
    if(timeLeft<=0){ timeLeft=0; updateTimerDisplay(); explode(); return; }
    updateTimerDisplay();
  },1000);
}
function penalize(moduleEl){
  mistakes++;
  timeLeft = Math.max(0, timeLeft-10);
  updateTimerDisplay();
  if(moduleEl){ moduleEl.classList.add('shake'); setTimeout(()=>moduleEl.classList.remove('shake'),300); }
  if(timeLeft<=0) explode();
}
function markSolved(key){
  solved[key]=true;
  document.getElementById('led-'+key).classList.add('on');
  document.getElementById('mod-'+key).classList.add('solved');
  if(Object.values(solved).every(v=>v)) defuse();
}
function explode(){
  clearInterval(bombTimer);
  const card = document.getElementById('overlay-card');
  card.className = 'overlay-card lose';
  document.getElementById('overlay-big').textContent = 'BOOM 💥';
  document.getElementById('overlay-sub').textContent = 'The clock ran out with '+Object.values(solved).filter(v=>!v).length+' module(s) still live. Mistakes made: '+mistakes+'.';
  document.getElementById('overlay').classList.add('active');
}
function defuse(){
  clearInterval(bombTimer);
  const card = document.getElementById('overlay-card');
  card.className = 'overlay-card win';
  document.getElementById('overlay-big').textContent = 'DEFUSED';
  document.getElementById('overlay-sub').textContent = 'All 4 modules cleared with '+fmt(timeLeft)+' left on the clock, and '+mistakes+' mistake(s) made.';
  document.getElementById('overlay').classList.add('active');
}
function renderDots(containerId, count, filled){
  const c = document.getElementById(containerId);
  c.innerHTML='';
  for(let i=0;i<count;i++){
    const d = document.createElement('span');
    d.className = 'dot'+(i<filled?' filled':'');
    c.appendChild(d);
  }
}

/* ================= MODULE 1: HISTORY WIRES ================= */
const wireEvents = [
  {label:'Charles Babbage designs the Analytical Engine', year:1837},
  {label:'Alan Turing publishes the Turing Machine theory', year:1936},
  {label:'Von Neumann architecture is proposed', year:1945},
  {label:'2nd Gen computers — transistors', year:1958},
  {label:'4th Gen computers — microprocessors', year:1975},
];
let wireOrder = [];
let wirePointer = 0;
function initWires(){
  wireOrder = [...wireEvents].sort(()=>Math.random()-0.5);
  wirePointer = 0;
  const list = document.getElementById('wire-list');
  list.innerHTML='';
  wireOrder.forEach((ev,idx)=>{
    const row = document.createElement('div');
    row.className='wire-row';
    row.dataset.idx = idx;
    row.innerHTML = `<span class="wire-dot w${idx%5}"></span><span>${ev.label}</span>`;
    row.onclick = ()=>clickWire(idx);
    list.appendChild(row);
  });
}
function clickWire(idx){
  if(solved.wires) return;
  const rows = document.querySelectorAll('#wire-list .wire-row');
  const row = rows[idx];
  if(row.classList.contains('cut')) return;
  const sortedByYear = [...wireOrder].sort((a,b)=>a.year-b.year);
  const expected = sortedByYear[wirePointer];
  if(wireOrder[idx].year === expected.year){
    row.classList.add('cut');
    wirePointer++;
    if(wirePointer>=wireOrder.length) markSolved('wires');
  } else {
    penalize(document.getElementById('mod-wires'));
    rows.forEach(r=>r.classList.remove('cut'));
    wirePointer = 0;
  }
}

/* ================= MODULE 2: NUMBER LOCK ================= */
const bases = {bin:2, dec:10, hex:16};
const baseNames = {bin:'binary', dec:'decimal', hex:'hexadecimal'};
let convStreak = 0, convAnswer='';
const CONV_NEEDED = 3;
function nextConvRound(){
  const num = Math.floor(Math.random()*250)+1;
  const pairs=[['dec','bin'],['bin','dec'],['dec','hex'],['hex','dec'],['bin','hex'],['hex','bin']];
  const [from,to] = pairs[Math.floor(Math.random()*pairs.length)];
  document.getElementById('conv-display').textContent = num.toString(bases[from]).toUpperCase();
  document.getElementById('conv-sub').textContent = baseNames[from]+' \u2192 convert to '+baseNames[to];
  convAnswer = num.toString(bases[to]);
  document.getElementById('conv-input').value='';
}
function initConv(){ convStreak=0; renderDots('conv-dots', CONV_NEEDED, 0); nextConvRound(); }
function submitConv(){
  if(solved.conv) return;
  const val = document.getElementById('conv-input').value.trim().toLowerCase();
  if(val === convAnswer.toLowerCase()){
    convStreak++;
    renderDots('conv-dots', CONV_NEEDED, convStreak);
    if(convStreak>=CONV_NEEDED){ markSolved('conv'); return; }
  } else {
    convStreak = 0;
    renderDots('conv-dots', CONV_NEEDED, 0);
    penalize(document.getElementById('mod-conv'));
  }
  nextConvRound();
}

/* ================= MODULE 3: SYSTEM SWITCHES ================= */
const sortItems = [
  {name:'Keyboard', cat:'Input'}, {name:'Mouse', cat:'Input'}, {name:'Scanner', cat:'Input'}, {name:'Microphone', cat:'Input'},
  {name:'Monitor', cat:'Output'}, {name:'Printer', cat:'Output'}, {name:'Speaker', cat:'Output'},
  {name:'ALU', cat:'Processing'}, {name:'Control Unit', cat:'Processing'}, {name:'Register', cat:'Processing'},
  {name:'SSD', cat:'Storage'}, {name:'RAM', cat:'Storage'},
];
let sortStreak = 0, sortCurrent = null;
const SORT_NEEDED = 3;
function nextSortItem(){
  sortCurrent = sortItems[Math.floor(Math.random()*sortItems.length)];
  document.getElementById('sort-name').textContent = sortCurrent.name;
}
function initSort(){ sortStreak=0; renderDots('sort-dots', SORT_NEEDED, 0); nextSortItem(); }
function answerSort(cat){
  if(solved.sort) return;
  if(cat === sortCurrent.cat){
    sortStreak++;
    renderDots('sort-dots', SORT_NEEDED, sortStreak);
    if(sortStreak>=SORT_NEEDED){ markSolved('sort'); return; }
  } else {
    sortStreak = 0;
    renderDots('sort-dots', SORT_NEEDED, 0);
    penalize(document.getElementById('mod-sort'));
  }
  nextSortItem();
}

/* ================= MODULE 4: LAW DIAL ================= */
const ethicsOptions = ['RA 10173 — Data Privacy Act', 'RA 10175 — Cybercrime Prevention Act', 'Copyright / IP Law', 'Open-Source License Terms'];
const ethicsCases = [
  {text:'A retail app quietly sells customer phone numbers and addresses to a marketing firm, without asking anyone first.', answer:'RA 10173 — Data Privacy Act'},
  {text:'An attacker breaks into a bank\u2019s servers and defaces its homepage overnight.', answer:'RA 10175 — Cybercrime Prevention Act'},
  {text:'A developer releases their code publicly and explicitly allows anyone to copy, modify, and redistribute it.', answer:'Open-Source License Terms'},
  {text:'A startup copies a competitor\u2019s app design pixel-for-pixel and sells it as an original product.', answer:'Copyright / IP Law'},
  {text:'An employee installs cracked, unlicensed copies of paid software across every office computer.', answer:'Copyright / IP Law'},
  {text:'Someone creates fake accounts to impersonate a real person and steal their online identity.', answer:'RA 10175 — Cybercrime Prevention Act'},
];
let ethStreak = 0, ethCurrent = null;
const ETH_NEEDED = 2;
function nextEthicsCase(){
  ethCurrent = ethicsCases[Math.floor(Math.random()*ethicsCases.length)];
  document.getElementById('eth-case').textContent = ethCurrent.text;
  const box = document.getElementById('eth-choices');
  box.innerHTML='';
  const shuffled = [...ethicsOptions].sort(()=>Math.random()-0.5);
  shuffled.forEach(opt=>{
    const btn = document.createElement('button');
    btn.className='choice2';
    btn.textContent = opt;
    btn.onclick = ()=>ruleEthics(opt, btn);
    box.appendChild(btn);
  });
}
function initEthics(){ ethStreak=0; renderDots('eth-dots', ETH_NEEDED, 0); nextEthicsCase(); }
function ruleEthics(opt, btn){
  if(solved.ethics) return;
  const correct = ethCurrent.answer;
  document.querySelectorAll('#eth-choices .choice2').forEach(b=>{
    b.onclick=null;
    if(b.textContent===correct) b.classList.add('correct');
    else if(b===btn) b.classList.add('wrong');
  });
  if(opt===correct){
    ethStreak++;
    renderDots('eth-dots', ETH_NEEDED, ethStreak);
    if(ethStreak>=ETH_NEEDED){ setTimeout(()=>markSolved('ethics'), 500); return; }
  } else {
    ethStreak = 0;
    renderDots('eth-dots', ETH_NEEDED, 0);
    penalize(document.getElementById('mod-ethics'));
  }
  setTimeout(nextEthicsCase, 700);
}

/* ================= INIT ================= */
initWires();
initConv();
initSort();
initEthics();
startBomb();
</script>
</body>
</html>
