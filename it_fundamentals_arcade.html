<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT Fundamentals — Defusal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b0e14;
    --panel:#151a22;
    --panel-edge:#2a323f;
    --steel:#8a929f;
    --red:#e2352f;
    --red-dim:#7a1e1b;
    --phosphor:#6df7c1;
    --gold:#f2c14e;
    --text:#eef1f5;
    --text-dim:#9aa2b1;
    --mono:'Space Mono', monospace;
    --sans:'Inter', sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:#050608; color:var(--text); font-family:var(--sans);
    min-height:100vh; padding:14px;
  }
  .frame{
    max-width:980px;margin:0 auto; border:6px solid var(--red); border-radius:10px;
    background:#0a0c10; padding:16px; box-shadow:0 0 40px rgba(226,53,47,0.15);
  }
  .frame.critical{ animation:critical-pulse .6s infinite; }
  @keyframes critical-pulse{
    0%,100%{box-shadow:0 0 20px rgba(226,53,47,0.2);}
    50%{box-shadow:0 0 55px rgba(226,53,47,0.55);}
  }
  .topbar{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; flex-wrap:wrap; gap:10px;}
  .logo{font-family:var(--mono); font-weight:700; line-height:1.1;}
  .logo .l1{font-size:20px; letter-spacing:.12em; color:var(--red);}
  .logo .l2{font-size:11px; letter-spacing:.14em; color:var(--text-dim);}
  a.homelink{font-family:var(--mono); font-size:11px; color:var(--text-dim); text-decoration:none; border:1px solid var(--panel-edge); border-radius:6px; padding:6px 10px;}
  a.homelink:hover{border-color:var(--red); color:var(--red);}

  .setup-title{font-family:var(--mono); font-size:13px; letter-spacing:.1em; color:var(--text-dim); text-align:center; margin:20px 0 14px;}
  .diffbtn{
    display:block; width:100%; max-width:460px; margin:0 auto 12px;
    font-family:var(--mono); font-size:13px; text-align:left;
    background:var(--panel); border:1px solid var(--panel-edge); color:var(--text);
    border-radius:8px; padding:14px 16px; cursor:pointer;
  }
  .diffbtn b{display:block; font-size:15px; color:var(--phosphor); margin-bottom:3px;}
  .diffbtn:hover{border-color:var(--phosphor);}

  .timer-wrap{text-align:center; margin:6px auto 14px;}
  .timer{
    display:inline-block; font-family:var(--mono); font-size:42px; font-weight:700;
    background:#03110a; color:var(--phosphor); border:2px solid #0e3a28; border-radius:8px;
    padding:6px 22px; letter-spacing:.06em; text-shadow:0 0 10px rgba(109,247,193,.6);
  }
  .timer.low{color:var(--red); text-shadow:0 0 14px rgba(226,53,47,.8); border-color:var(--red-dim);}
  .strikes{font-family:var(--mono); font-size:11px; color:var(--text-dim); margin-top:6px;}
  .strikes b{color:var(--red);}
  .solvedcount{font-family:var(--mono); font-size:11px; color:var(--phosphor); margin-top:4px;}

  .flipbtn{
    display:block; margin:0 auto 14px; font-family:var(--mono); font-size:12px;
    background:var(--panel); border:1px solid var(--panel-edge); color:var(--steel);
    border-radius:6px; padding:8px 14px; cursor:pointer;
  }
  .flipbtn:hover{border-color:var(--gold); color:var(--gold);}
  .backnote{text-align:center; font-family:var(--mono); font-size:11px; color:var(--text-dim); margin-bottom:6px;}

  .module-grid{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; }
  @media (max-width:820px){ .module-grid{grid-template-columns:1fr 1fr;} }
  @media (max-width:560px){ .module-grid{grid-template-columns:1fr;} }

  .module{ position:relative; background:var(--panel); border:2px solid var(--panel-edge); border-radius:10px; padding:16px 14px 14px; min-height:190px; }
  .module.solved{border-color:#1f6b4c;}
  .led{ position:absolute; top:10px; left:10px; width:12px; height:12px; border-radius:50%; background:#4a0d0b; border:1px solid #300; box-shadow:inset 0 0 3px #000; }
  .led.on{ background:var(--phosphor); border-color:var(--phosphor); box-shadow:0 0 10px var(--phosphor); }
  .mtitle{ font-family:var(--mono); font-size:12px; letter-spacing:.08em; color:var(--steel); text-transform:uppercase; text-align:center; margin-bottom:10px; }
  .mbody{font-size:13px;}
  .progress-dots{display:flex; justify-content:center; gap:6px; margin-top:10px;}
  .dot{width:8px;height:8px;border-radius:50%; background:#333c48; border:1px solid #444e5e;}
  .dot.filled{background:var(--phosphor); border-color:var(--phosphor);}

  .shake{animation:shakeit .3s;}
  @keyframes shakeit{25%{transform:translateX(-5px);}75%{transform:translateX(5px);}}

  .wire-row{ display:flex; align-items:center; gap:8px; background:#0e1420; border:1px solid var(--panel-edge); border-radius:6px; padding:8px 10px; margin-bottom:6px; cursor:pointer; font-size:11.5px; }
  .wire-row:hover{border-color:var(--steel);}
  .wire-row.cut{opacity:.45; border-color:#1f6b4c; cursor:default; text-decoration:line-through; color:var(--phosphor);}
  .wire-dot{width:14px;height:6px;border-radius:3px; flex-shrink:0;}
  .w0{background:#c0392b;} .w1{background:#e2965f;} .w2{background:#f2c14e;} .w3{background:#6df7c1;} .w4{background:#5fa8e2;}

  .conv-display{font-family:var(--mono); font-size:26px; text-align:center; color:var(--gold); margin-bottom:4px;}
  .conv-sub{text-align:center; font-size:11px; color:var(--text-dim); font-family:var(--mono); margin-bottom:10px;}
  .conv-input{width:100%; font-family:var(--mono); font-size:16px; text-align:center; background:#0e1420; border:1px solid var(--panel-edge); color:var(--text); border-radius:6px; padding:8px; margin-bottom:8px;}
  .conv-input:focus{outline:none; border-color:var(--phosphor);}

  .sort-name{font-family:var(--mono); font-size:16px; text-align:center; margin-bottom:12px; color:var(--text);}
  .bins2{display:grid; grid-template-columns:1fr 1fr; gap:6px;}
  .bin2{font-size:11px; font-weight:600; background:#0e1420; border:1px solid var(--panel-edge); border-radius:6px; padding:9px 4px; text-align:center; cursor:pointer;}
  .bin2:hover{border-color:var(--phosphor); color:var(--phosphor);}

  .case2{font-size:11.5px; line-height:1.5; margin-bottom:10px; color:var(--text);}
  .choice2{display:block; width:100%; text-align:left; font-size:11px; background:#0e1420; border:1px solid var(--panel-edge); color:var(--text); border-radius:6px; padding:8px 10px; margin-bottom:6px; cursor:pointer;}
  .choice2:hover{border-color:var(--steel);}
  .choice2.correct{border-color:var(--phosphor); color:var(--phosphor);}
  .choice2.wrong{border-color:var(--red); color:var(--red);}

  button.action{font-family:var(--sans); font-weight:600; font-size:13px; background:var(--steel); color:#111; border:none; border-radius:6px; padding:8px 12px; cursor:pointer; width:100%;}
  button.action:hover{background:#a9b2bf;}

  .overlay{ position:fixed; inset:0; background:rgba(3,4,6,0.92); display:none; align-items:center; justify-content:center; z-index:50; padding:20px; }
  .overlay.active{display:flex;}
  .overlay-card{ text-align:center; max-width:360px; width:100%; background:var(--panel); border:2px solid var(--panel-edge); border-radius:12px; padding:28px 20px; }
  .overlay-card.win{border-color:var(--phosphor);}
  .overlay-card.lose{border-color:var(--red);}
  .overlay-big{font-family:var(--mono); font-size:26px; margin-bottom:8px;}
  .overlay-card.win .overlay-big{color:var(--phosphor);}
  .overlay-card.lose .overlay-big{color:var(--red);}
  .overlay-sub{color:var(--text-dim); font-size:13px; margin-bottom:18px;}
</style>
</head>
<body>
<div class="frame" id="frame">
  <div class="topbar">
    <a class="homelink" href="index.html">&larr; HOME</a>
    <div class="logo" style="text-align:right;">
      <div class="l1">DEFUSAL</div>
      <div class="l2">IT FUNDAMENTALS</div>
    </div>
  </div>

  <div id="setup">
    <div class="setup-title">SELECT DIFFICULTY</div>
    <button class="diffbtn" onclick="startGame('easy')"><b>EASY</b>6 modules (3×2) · one side · 1:30 on the clock</button>
    <button class="diffbtn" onclick="startGame('hard')"><b>HARD</b>12 modules (3×2 per side) · front &amp; back · 1:30 on the clock — the backside has no timer, flip to the front to check it</button>
  </div>

  <div id="game" style="display:none;">
    <div id="frontView">
      <div class="timer-wrap">
        <div class="timer" id="timer">00:00</div>
        <div class="strikes">MISTAKES COST <b>-10s</b> EACH</div>
        <div class="solvedcount" id="solvedcount-front">SOLVED 0/0</div>
      </div>
      <button class="flipbtn" id="flipToBack" onclick="flipTo('back')" style="display:none;">TURN BOMB AROUND &rarr; BACKSIDE</button>
      <div class="module-grid" id="frontGrid"></div>
    </div>
    <div id="backView" style="display:none;">
      <div class="backnote">BACKSIDE — no clock here. Turn the bomb around to check the time.</div>
      <div class="solvedcount" id="solvedcount-back" style="text-align:center; margin-bottom:10px;">SOLVED 0/0</div>
      <button class="flipbtn" onclick="flipTo('front')">&larr; TURN BOMB AROUND TO FRONT</button>
      <div class="module-grid" id="backGrid"></div>
    </div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="overlay-card" id="overlay-card">
    <div class="overlay-big" id="overlay-big">—</div>
    <div class="overlay-sub" id="overlay-sub">—</div>
    <button class="action" onclick="location.reload()">TRY AGAIN</button>
  </div>
</div>

<script>
/* ================= UTIL ================= */
function shuffle(arr){ return [...arr].sort(()=>Math.random()-0.5); }
function fmt(t){ const m=Math.floor(t/60).toString().padStart(2,'0'); const s=Math.floor(t%60).toString().padStart(2,'0'); return m+':'+s; }

/* ================= CONTENT POOLS ================= */

/* -- Computing Concepts: data vs info, hardware vs software, IPO cycle,
      types of computers, units of measurement (reviewer doc, IT Fundamentals > Computing Concepts) -- */
const conceptQuestions = [
  {text:'Raw, unprocessed facts such as numbers and text are called:', options:['Information','Data','Software','Firmware'], answer:'Data'},
  {text:'Data that has been processed, organized, and given context so it is meaningful is called:', options:['Data','Information','Hardware','Instruction'], answer:'Information'},
  {text:'The physical, tangible parts of a computer (CPU, RAM, storage) are collectively called:', options:['Software','Hardware','Data','Protocol'], answer:'Hardware'},
  {text:'The set of instructions/programs that tell hardware what to do is called:', options:['Hardware','Data','Software','Input'], answer:'Software'},
  {text:'An Operating System like Windows or macOS is an example of:', options:['Application software','System software','Hardware','Firmware'], answer:'System software'},
  {text:'In the IPO Cycle, which stage comes first?', options:['Output','Process','Input','Storage'], answer:'Input'},
  {text:'In the IPO Cycle, raw data is transformed into meaningful output during the ___ stage.', options:['Input','Process','Output','Storage'], answer:'Process'},
  {text:'The IPO Cycle is sometimes extended to include a 4th stage after Output, which is:', options:['Storage','Feedback','Encoding','Decoding'], answer:'Storage'},
  {text:'Which type of computer generally has the greatest processing power?', options:['Supercomputer','Personal Computer','Mobile Device','Server'], answer:'Supercomputer'},
  {text:'A smartphone is best classified, by processing power/purpose, as a:', options:['Mainframe','Server','Mobile device / embedded system','Supercomputer'], answer:'Mobile device / embedded system'},
  {text:'How many bits are in one byte?', options:['4','8','16','1024'], answer:'8'},
  {text:'Which of these units of storage is the LARGEST?', options:['KB','MB','GB','Byte'], answer:'GB'},
  {text:'In binary (not marketing/decimal) terms, each storage unit is ___ times the size of the one before it.', options:['100','1000','1024','2048'], answer:'1024'},
  {text:'Ranking bit → byte → KB → MB, which comes right after "byte"?', options:['Bit','KB','MB','GB'], answer:'KB'},
];

/* -- History of Computers: pioneers + generations (reviewer doc, IT Fundamentals > History of Computers) -- */
const historyPool = [
  {label:'Charles Babbage designs the Analytical Engine ("father of the computer")', year:1837},
  {label:'Ada Lovelace writes the first program for a computing machine ("first programmer")', year:1843},
  {label:'Alan Turing develops the Turing Machine (computability theory)', year:1936},
  {label:'1st Gen computers use vacuum tubes, e.g. ENIAC', year:1945},
  {label:"Von Neumann's stored-program architecture is proposed", year:1946},
  {label:'2nd Gen computers switch to transistors — smaller, faster, less heat', year:1955},
  {label:'3rd Gen computers use integrated circuits (ICs)', year:1965},
  {label:'4th Gen computers put the entire CPU on a microprocessor', year:1975},
  {label:'5th Gen computing emphasizes AI, parallel processing, and natural language', year:2020},
];

/* -- Number Systems: base conversion (bin/oct/dec/hex) + binary addition
      (reviewer doc, IT Fundamentals > Number Systems) -- */
const bases = {bin:2, dec:10, hex:16, oct:8};
const baseNames = {bin:'binary', dec:'decimal', hex:'hexadecimal', oct:'octal'};

/* -- Elements of Computer and Communication Systems (reviewer doc, IT Fundamentals > Elements) --
      Sorting round: core hardware components (CPU, RAM, secondary storage, input/output devices)
      MC round: motherboard, bus types, communication-system elements */
const sortItems = [
  {name:'Keyboard', cat:'Input'}, {name:'Mouse', cat:'Input'}, {name:'Scanner', cat:'Input'},
  {name:'Monitor', cat:'Output'}, {name:'Printer', cat:'Output'}, {name:'Speakers', cat:'Output'},
  {name:'CPU', cat:'Processing'},
  {name:'RAM (Main Memory)', cat:'Memory'},
  {name:'HDD (Secondary Storage)', cat:'Storage'}, {name:'SSD (Secondary Storage)', cat:'Storage'},
];
const elementsMCQuestions = [
  {text:'The main circuit board that connects the CPU, RAM, and expansion buses is called the:', options:['Motherboard','Chipset','Power Supply','Case'], answer:'Motherboard'},
  {text:'Which bus carries the actual data being transferred between components?', options:['Data bus','Address bus','Control bus','System bus'], answer:'Data bus'},
  {text:'Which bus carries memory addresses, telling the CPU where to read or write?', options:['Data bus','Address bus','Control bus','Feedback bus'], answer:'Address bus'},
  {text:'Which bus carries control signals such as read/write commands?', options:['Data bus','Address bus','Control bus','Noise bus'], answer:'Control bus'},
  {text:'In a communication system, the person or device that originates the message is the:', options:['Sender','Receiver','Encoder','Decoder'], answer:'Sender'},
  {text:'The component that converts a message into a signal suitable for transmission is the:', options:['Sender','Receiver','Encoder','Decoder'], answer:'Encoder'},
  {text:'The component that converts a received signal back into an understandable message is the:', options:['Sender','Encoder','Decoder','Channel'], answer:'Decoder'},
  {text:'The physical path data travels through (e.g. cable, air) is called the:', options:['Channel / transmission medium','Encoder','Feedback','Noise'], answer:'Channel / transmission medium'},
  {text:'Unwanted interference that can distort a message during transmission is called:', options:['Feedback','Noise','Encoding','Bandwidth'], answer:'Noise'},
  {text:'Information sent back to the sender confirming a message was received is called:', options:['Noise','Channel','Feedback','Encoding'], answer:'Feedback'},
];

/* -- IT Social and Professional Issues (reviewer doc, IT Fundamentals > IT Social and Professional Issues) --
      IP types, software licensing, privacy/cybercrime law, professional ethics, digital divide */
const ethicsQuestions = [
  {text:'Which type of intellectual property protection covers an original literary or artistic work?', options:['Copyright','Patent','Trademark','Data Privacy Act'], answer:'Copyright'},
  {text:'Which type of intellectual property protection covers a new invention or process?', options:['Copyright','Patent','Trademark','Cybercrime Law'], answer:'Patent'},
  {text:'Which type of intellectual property protection covers a brand name or logo?', options:['Copyright','Patent','Trademark','Software License'], answer:'Trademark'},
  {text:'Software you must pay for, with closed/inaccessible source code, is called:', options:['Freeware','Shareware','Open-source','Proprietary / commercial'], answer:'Proprietary / commercial'},
  {text:'Software that is free to use but generally cannot be modified (closed source) is called:', options:['Freeware','Shareware','Open-source','Proprietary'], answer:'Freeware'},
  {text:'Software you can try for free but must pay for after a trial period is called:', options:['Freeware','Shareware','Open-source','Proprietary'], answer:'Shareware'},
  {text:'Software distributed under licenses like GPL or MIT, where source code is open to view and modify, is called:', options:['Freeware','Shareware','Open-source','Proprietary'], answer:'Open-source'},
  {text:'In the Philippines, RA 10173 — governing the collection and processing of personal data — is known as the:', options:['Data Privacy Act of 2012','Cybercrime Prevention Act of 2012','Copyright Law','Software License Agreement'], answer:'Data Privacy Act of 2012'},
  {text:'In the Philippines, RA 10175 — covering hacking, identity theft, and cyber-libel — is known as the:', options:['Data Privacy Act of 2012','Cybercrime Prevention Act of 2012','Patent Law','Freeware Agreement'], answer:'Cybercrime Prevention Act of 2012'},
  {text:'The professional code emphasizing honesty, competence, confidentiality, and avoiding harm for IT practitioners is the:', options:['ACM/IEEE Code of Ethics','Data Privacy Act','Cybercrime Prevention Act','Open-Source License'], answer:'ACM/IEEE Code of Ethics'},
  {text:'The gap between those with access to modern ICT and those without is called the:', options:['Digital Divide','Data Privacy Gap','Cyber Gap','Bandwidth Divide'], answer:'Digital Divide'},
];

/* ================= GLOBAL BOMB STATE ================= */
let timeLeft = 0, mistakes = 0, bombTimer = null;
let moduleState = {};
let allModuleIds = [];
let solvedCount = 0;
let usedWireSets = [];

function updateTimerDisplay(){
  const el = document.getElementById('timer');
  el.textContent = fmt(timeLeft);
  el.classList.toggle('low', timeLeft<=60);
  document.getElementById('frame').classList.toggle('critical', timeLeft<=30);
}
function startBomb(){
  updateTimerDisplay();
  bombTimer = setInterval(()=>{
    timeLeft--;
    if(timeLeft<=0){ timeLeft=0; updateTimerDisplay(); explode(); return; }
    updateTimerDisplay();
  },1000);
}
function penalize(id){
  mistakes++;
  timeLeft = Math.max(0, timeLeft-10);
  updateTimerDisplay();
  const el = document.getElementById(id);
  if(el){ el.classList.add('shake'); setTimeout(()=>el.classList.remove('shake'),300); }
  if(timeLeft<=0) explode();
}
function updateSolvedCounts(){
  const txt = 'SOLVED '+solvedCount+'/'+allModuleIds.length;
  const f = document.getElementById('solvedcount-front'); if(f) f.textContent = txt;
  const b = document.getElementById('solvedcount-back'); if(b) b.textContent = txt;
}
function markSolved(id){
  if(moduleState[id].solved) return;
  moduleState[id].solved = true;
  document.getElementById(id+'-led').classList.add('on');
  document.getElementById(id).classList.add('solved');
  solvedCount++;
  updateSolvedCounts();
  if(solvedCount>=allModuleIds.length) defuse();
}
function explode(){
  clearInterval(bombTimer);
  const card = document.getElementById('overlay-card');
  card.className = 'overlay-card lose';
  document.getElementById('overlay-big').textContent = 'BOOM 💥';
  document.getElementById('overlay-sub').textContent = 'The clock ran out with '+(allModuleIds.length-solvedCount)+' module(s) still live. Mistakes made: '+mistakes+'.';
  document.getElementById('overlay').classList.add('active');
}
function defuse(){
  clearInterval(bombTimer);
  const card = document.getElementById('overlay-card');
  card.className = 'overlay-card win';
  document.getElementById('overlay-big').textContent = 'DEFUSED';
  document.getElementById('overlay-sub').textContent = 'All '+allModuleIds.length+' modules cleared with '+fmt(timeLeft)+' left on the clock, and '+mistakes+' mistake(s) made.';
  document.getElementById('overlay').classList.add('active');
}
function renderDots(containerId, count, filled){
  const c = document.getElementById(containerId);
  if(!c) return;
  c.innerHTML='';
  for(let i=0;i<count;i++){
    const d = document.createElement('span');
    d.className = 'dot'+(i<filled?' filled':'');
    c.appendChild(d);
  }
}
function flipTo(view){
  document.getElementById('frontView').style.display = view==='front' ? 'block':'none';
  document.getElementById('backView').style.display = view==='back' ? 'block':'none';
}

/* ================= MODULE SHELL ================= */
function moduleShell(id, label){
  const div = document.createElement('div');
  div.className='module';
  div.id=id;
  div.innerHTML = `<div class="led" id="${id}-led"></div><div class="mtitle">${label}</div><div class="mbody" id="${id}-body"></div>`;
  return div;
}
const typeLabels = {
  concepts:'Computing Concepts — Console',
  wires:'History of Computers — Wires',
  conv:'Number Systems — Lock',
  sort:'Elements of a System — Switches',
  ethics:'Social &amp; Professional Issues — Dial',
};

let instanceCounters = {concepts:0, wires:0, conv:0, sort:0, ethics:0};
const romanSuffix = ['', ' II', ' III', ' IV'];

function createModule(type, gridEl){
  const num = ++instanceCounters[type];
  const id = type+'-'+num;
  const label = typeLabels[type] + (romanSuffix[num-1] || ' '+num);
  const el = moduleShell(id, label);
  gridEl.appendChild(el);
  allModuleIds.push(id);
  moduleState[id] = {type, solved:false};
  if(type==='concepts') initConcepts(id);
  if(type==='wires') initWires(id);
  if(type==='conv') initConv(id);
  if(type==='sort') initSort(id);
  if(type==='ethics') initEthics(id);
}

/* ================= COMPUTING CONCEPTS ================= */
const CONCEPTS_NEEDED = 3;
function nextConceptQ(id){
  const q = conceptQuestions[Math.floor(Math.random()*conceptQuestions.length)];
  moduleState[id].current = q;
  document.getElementById(id+'-case').textContent = q.text;
  const box = document.getElementById(id+'-choices');
  box.innerHTML='';
  shuffle(q.options).forEach(opt=>{
    const btn = document.createElement('button');
    btn.className='choice2';
    btn.textContent = opt;
    btn.onclick = ()=>answerConcept(id, opt, btn);
    box.appendChild(btn);
  });
}
function initConcepts(id){
  moduleState[id].streak = 0;
  const body = document.getElementById(id+'-body');
  body.innerHTML = `
    <div class="case2" id="${id}-case">—</div>
    <div id="${id}-choices"></div>
    <div class="progress-dots" id="${id}-dots"></div>`;
  renderDots(id+'-dots', CONCEPTS_NEEDED, 0);
  nextConceptQ(id);
}
function answerConcept(id, opt, btn){
  const st = moduleState[id];
  if(st.solved) return;
  const correct = st.current.answer;
  document.querySelectorAll('#'+id+'-choices .choice2').forEach(b=>{
    b.onclick=null;
    if(b.textContent===correct) b.classList.add('correct');
    else if(b===btn) b.classList.add('wrong');
  });
  if(opt===correct){
    st.streak++;
    renderDots(id+'-dots', CONCEPTS_NEEDED, st.streak);
    if(st.streak>=CONCEPTS_NEEDED){ setTimeout(()=>markSolved(id), 500); return; }
  } else {
    st.streak = 0;
    renderDots(id+'-dots', CONCEPTS_NEEDED, 0);
    penalize(id);
  }
  setTimeout(()=>nextConceptQ(id), 700);
}

/* ================= HISTORY WIRES ================= */
function sameSet(a,b){
  const la=a.map(x=>x.label).sort().join('|');
  const lb=b.map(x=>x.label).sort().join('|');
  return la===lb;
}
function pickWireSet(){
  let subset, tries=0;
  do{ subset = shuffle(historyPool).slice(0,5); tries++; }
  while(usedWireSets.some(s=>sameSet(s,subset)) && tries<20);
  usedWireSets.push(subset);
  return subset;
}
function initWires(id){
  const order = shuffle(pickWireSet());
  moduleState[id].order = order;
  moduleState[id].pointer = 0;
  const body = document.getElementById(id+'-body');
  body.innerHTML = `<div id="${id}-list"></div>`;
  const list = document.getElementById(id+'-list');
  order.forEach((ev, idx)=>{
    const row = document.createElement('div');
    row.className='wire-row';
    row.innerHTML = `<span class="wire-dot w${idx%5}"></span><span>${ev.label}</span>`;
    row.onclick = ()=>clickWire(id, idx);
    list.appendChild(row);
  });
}
function clickWire(id, idx){
  const st = moduleState[id];
  if(st.solved) return;
  const rows = document.querySelectorAll('#'+id+'-list .wire-row');
  const row = rows[idx];
  if(row.classList.contains('cut')) return;
  const sortedByYear = [...st.order].sort((a,b)=>a.year-b.year);
  const expected = sortedByYear[st.pointer];
  if(st.order[idx].year === expected.year){
    row.classList.add('cut');
    st.pointer++;
    if(st.pointer>=st.order.length) markSolved(id);
  } else {
    penalize(id);
    rows.forEach(r=>r.classList.remove('cut'));
    st.pointer = 0;
  }
}

/* ================= NUMBER LOCK ================= */
const CONV_NEEDED = 3;
function nextConvRound(id){
  if(Math.random() < 0.7){
    const num = Math.floor(Math.random()*250)+1;
    const pairs=[['dec','bin'],['bin','dec'],['dec','hex'],['hex','dec'],['bin','hex'],['hex','bin'],['dec','oct'],['oct','dec']];
    const [from,to] = pairs[Math.floor(Math.random()*pairs.length)];
    document.getElementById(id+'-display').textContent = num.toString(bases[from]).toUpperCase();
    document.getElementById(id+'-sub').textContent = baseNames[from]+' \u2192 convert to '+baseNames[to];
    moduleState[id].answer = num.toString(bases[to]);
  } else {
    const a = Math.floor(Math.random()*20)+1;
    const b = Math.floor(Math.random()*20)+1;
    document.getElementById(id+'-display').textContent = a.toString(2)+' + '+b.toString(2);
    document.getElementById(id+'-sub').textContent = 'binary addition \u2192 give the sum in binary';
    moduleState[id].answer = (a+b).toString(2);
  }
  document.getElementById(id+'-input').value='';
}
function initConv(id){
  moduleState[id].streak = 0;
  const body = document.getElementById(id+'-body');
  body.innerHTML = `
    <div class="conv-display" id="${id}-display">—</div>
    <div class="conv-sub" id="${id}-sub">convert to —</div>
    <input class="conv-input" id="${id}-input" placeholder="answer" autocomplete="off">
    <button class="action" id="${id}-btn">ENTER</button>
    <div class="progress-dots" id="${id}-dots"></div>`;
  document.getElementById(id+'-btn').onclick = ()=>submitConv(id);
  document.getElementById(id+'-input').onkeydown = (e)=>{ if(e.key==='Enter') submitConv(id); };
  renderDots(id+'-dots', CONV_NEEDED, 0);
  nextConvRound(id);
}
function submitConv(id){
  const st = moduleState[id];
  if(st.solved) return;
  const val = document.getElementById(id+'-input').value.trim().toLowerCase();
  if(val === st.answer.toLowerCase()){
    st.streak++;
    renderDots(id+'-dots', CONV_NEEDED, st.streak);
    if(st.streak>=CONV_NEEDED){ markSolved(id); return; }
  } else {
    st.streak = 0;
    renderDots(id+'-dots', CONV_NEEDED, 0);
    penalize(id);
  }
  nextConvRound(id);
}

/* ================= ELEMENTS OF A SYSTEM: SORT + MC ================= */
const SORT_NEEDED = 3;
function nextSortRound(id){
  const st = moduleState[id];
  const body = document.getElementById(id+'-body');
  if(Math.random() < 0.6){
    st.mode = 'sort';
    const item = sortItems[Math.floor(Math.random()*sortItems.length)];
    st.current = item;
    body.innerHTML = `
      <div class="sort-name" id="${id}-name">${item.name}</div>
      <div class="bins2">
        <div class="bin2" data-c="Input">INPUT</div>
        <div class="bin2" data-c="Output">OUTPUT</div>
        <div class="bin2" data-c="Processing">PROCESSING</div>
        <div class="bin2" data-c="Memory">MEMORY</div>
        <div class="bin2" data-c="Storage">STORAGE</div>
      </div>
      <div class="progress-dots" id="${id}-dots"></div>`;
    body.querySelectorAll('.bin2').forEach(b=>{ b.onclick = ()=>answerSort(id, b.dataset.c); });
  } else {
    st.mode = 'mc';
    const q = elementsMCQuestions[Math.floor(Math.random()*elementsMCQuestions.length)];
    st.current = q;
    body.innerHTML = `
      <div class="case2" id="${id}-case">${q.text}</div>
      <div id="${id}-choices"></div>
      <div class="progress-dots" id="${id}-dots"></div>`;
    const box = document.getElementById(id+'-choices');
    shuffle(q.options).forEach(opt=>{
      const btn = document.createElement('button');
      btn.className='choice2';
      btn.textContent = opt;
      btn.onclick = ()=>answerElementsMC(id, opt, btn);
      box.appendChild(btn);
    });
  }
  renderDots(id+'-dots', SORT_NEEDED, st.streak);
}
function initSort(id){
  moduleState[id].streak = 0;
  nextSortRound(id);
}
function answerSort(id, cat){
  const st = moduleState[id];
  if(st.solved) return;
  if(cat === st.current.cat){
    st.streak++;
    if(st.streak>=SORT_NEEDED){ markSolved(id); return; }
  } else {
    st.streak = 0;
    penalize(id);
  }
  nextSortRound(id);
}
function answerElementsMC(id, opt, btn){
  const st = moduleState[id];
  if(st.solved) return;
  const correct = st.current.answer;
  document.querySelectorAll('#'+id+'-choices .choice2').forEach(b=>{
    b.onclick=null;
    if(b.textContent===correct) b.classList.add('correct');
    else if(b===btn) b.classList.add('wrong');
  });
  if(opt===correct){
    st.streak++;
    if(st.streak>=SORT_NEEDED){ setTimeout(()=>markSolved(id), 500); return; }
  } else {
    st.streak = 0;
    penalize(id);
  }
  setTimeout(()=>nextSortRound(id), 700);
}

/* ================= SOCIAL & PROFESSIONAL ISSUES DIAL ================= */
const ETH_NEEDED = 3;
function nextEthicsCase(id){
  const q = ethicsQuestions[Math.floor(Math.random()*ethicsQuestions.length)];
  moduleState[id].current = q;
  document.getElementById(id+'-case').textContent = q.text;
  const box = document.getElementById(id+'-choices');
  box.innerHTML='';
  shuffle(q.options).forEach(opt=>{
    const btn = document.createElement('button');
    btn.className='choice2';
    btn.textContent = opt;
    btn.onclick = ()=>ruleEthics(id, opt, btn);
    box.appendChild(btn);
  });
}
function initEthics(id){
  moduleState[id].streak = 0;
  const body = document.getElementById(id+'-body');
  body.innerHTML = `
    <div class="case2" id="${id}-case">—</div>
    <div id="${id}-choices"></div>
    <div class="progress-dots" id="${id}-dots"></div>`;
  renderDots(id+'-dots', ETH_NEEDED, 0);
  nextEthicsCase(id);
}
function ruleEthics(id, opt, btn){
  const st = moduleState[id];
  if(st.solved) return;
  const correct = st.current.answer;
  document.querySelectorAll('#'+id+'-choices .choice2').forEach(b=>{
    b.onclick=null;
    if(b.textContent===correct) b.classList.add('correct');
    else if(b===btn) b.classList.add('wrong');
  });
  if(opt===correct){
    st.streak++;
    renderDots(id+'-dots', ETH_NEEDED, st.streak);
    if(st.streak>=ETH_NEEDED){ setTimeout(()=>markSolved(id), 500); return; }
  } else {
    st.streak = 0;
    renderDots(id+'-dots', ETH_NEEDED, 0);
    penalize(id);
  }
  setTimeout(()=>nextEthicsCase(id), 700);
}

/* ================= GAME START ================= */
function buildSideTypes(types){
  const base = shuffle(types);
  const dupType = base[Math.floor(Math.random()*base.length)];
  return shuffle([...base, dupType]); // 6 total
}

function startGame(difficulty){
  document.getElementById('setup').style.display='none';
  document.getElementById('game').style.display='block';

  const types = ['concepts','wires','conv','sort','ethics'];
  const frontGrid = document.getElementById('frontGrid');
  const backGrid = document.getElementById('backGrid');

  buildSideTypes(types).forEach(t=>createModule(t, frontGrid));

  if(difficulty==='hard'){
    timeLeft = 90;
    buildSideTypes(types).forEach(t=>createModule(t, backGrid));
    document.getElementById('flipToBack').style.display='block';
  } else {
    timeLeft = 90;
  }

  updateSolvedCounts();
  flipTo('front');
  startBomb();
}
